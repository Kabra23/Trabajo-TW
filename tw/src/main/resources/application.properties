# ==========================================
# BASE DE DATOS SQLite
# ==========================================
spring.datasource.url=jdbc:sqlite:TANI.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.username=
spring.datasource.password=

# Hibernate / JPA
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ==========================================
# THYMELEAF
# ==========================================
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# ==========================================
# SUBIDA DE ARCHIVOS
# ==========================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# Carpeta uploads: ruta RELATIVA al directorio de trabajo.
# Con Tomcat embebido (mvn spring-boot:run) esto será ./uploads/ dentro del proyecto.
# Con Tomcat externo, usar ruta absoluta, por ejemplo:
#   app.upload.dir=/home/usuario/cume-uploads
app.upload.dir=uploads

# ==========================================
# LOGGING
# ==========================================
logging.level.org.springframework.web=WARN
logging.level.org.hibernate=WARN
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE
