# ==========================================
# CONFIGURACIÓN PARA TOMCAT EXTERNO
# ==========================================
# NOTA: Con Tomcat externo, server.port no tiene efecto
# El puerto lo gestiona Tomcat (por defecto 8080)
# spring.application.name=cume

# ==========================================
# BASE DE DATOS SQLite
# ==========================================
# IMPORTANTE para Tomcat: usar ruta ABSOLUTA o relativa al home del usuario
# Opción 1 (recomendada): ruta absoluta
# spring.datasource.url=jdbc:sqlite:/ruta/absoluta/TANI.db
#
# Opción 2: relativa al directorio de trabajo de Tomcat (catalina.home)
spring.datasource.url=jdbc:sqlite:TANI.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.username=
spring.datasource.password=

# Hibernate / JPA
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ==========================================
# THYMELEAF
# ==========================================
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# ==========================================
# SUBIDA DE ARCHIVOS
# ==========================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# Carpeta uploads - con Tomcat usar ruta absoluta
app.upload.dir=uploads

# ==========================================
# CONTEXTO (context path)
# ==========================================
# Si el WAR se llama "cume.war", Tomcat lo sirve en /cume
# Para servirlo en la raíz "/" renombra el WAR a ROOT.war
# O descomenta la siguiente línea si usas Tomcat embebido:
# server.servlet.context-path=/
