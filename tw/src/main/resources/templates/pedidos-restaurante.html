<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedidos recibidos - CUMe y Calla</title>
    <link rel="stylesheet" th:href="@{/css/base.css}">
</head>
<body>
<header th:replace="~{fragments/layout :: header}"></header>

<main>
    <div class="container">
        <div class="page-header">
            <h1 class="page-title">Pedidos recibidos</h1>
            <a th:href="@{/restaurantes/{id}(id=${restauranteId})}" class="btn btn-secondary">
                Volver al restaurante
            </a>
        </div>

        <div th:replace="~{fragments/layout :: mensajes}"></div>

        <div th:if="${#lists.isEmpty(pedidos)}" class="empty-state">
            <p>Aún no has recibido ningún pedido.</p>
        </div>

        <div th:each="pedido : ${pedidos}" class="pedido-card">
            <div class="pedido-card-header">
                <div class="pedido-info-principal">
                    <h3 class="pedido-id">Pedido #<span th:text="${pedido.id}">0</span></h3>
                    <span class="text-muted" th:text="${#temporals.format(pedido.fecha, 'dd/MM/yyyy HH:mm')}">Fecha</span>
                    <div class="cliente-info">
                        <span class="text-muted">Cliente: </span>
                        <strong th:text="${pedido.usuario.nombre} + ' ' + ${pedido.usuario.apellidos}">Usuario</strong>
                    </div>
                </div>
                <div class="pedido-card-summary">
                    <div class="pedido-total" th:text="${#numbers.formatDecimal(pedido.total,1,2)} + ' €'">0 €</div>
                    <span class="pedido-estado" th:classappend="${pedido.estado.name().toLowerCase()}" th:text="${pedido.estado.name()}">Estado</span>
                </div>
            </div>
            </div>

            <table class="table lineas-pedido">
                <thead>
                <tr>
                    <th>Plato</th>
                    <th class="text-center">Cant.</th>
                    <th class="text-right">Precio u.</th>
                    <th class="text-right">Subtotal</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="linea : ${pedido.lineas}">
                    <td th:text="${linea.nombrePlato}">Plato</td>
                    <td class="text-center" th:text="${linea.cantidad}">1</td>
                    <td class="text-right" th:text="${#numbers.formatDecimal(linea.precio,1,2)} + ' €'">0 €</td>
                    <td class="text-right font-weight-bold" th:text="${#numbers.formatDecimal(linea.precio * linea.cantidad,1,2)} + ' €'">0 €</td>
                </tr>
                </tbody>
            </table>

            <form th:action="@{/pedidos/{id}/cambiar-estado(id=${pedido.id})}" method="post" class="form-inline">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <label for="estado" class="font-weight-bold">Cambiar estado:</label>
                <select name="estado" id="estado" class="form-control">
                    <option value="PENDIENTE" th:selected="${pedido.estado.name() == 'PENDIENTE'}">Pendiente</option>
                    <option value="EN_PREPARACION" th:selected="${pedido.estado.name() == 'EN_PREPARACION'}">En preparación</option>
                    <option value="ENVIADO" th:selected="${pedido.estado.name() == 'ENVIADO'}">Enviado</option>
                    <option value="ENTREGADO" th:selected="${pedido.estado.name() == 'ENTREGADO'}">Entregado</option>
                </select>
                <button type="submit" class="btn btn-primary">Actualizar</button>
            </form>
        </div>
    </div>
</main>
</body>
</html>
