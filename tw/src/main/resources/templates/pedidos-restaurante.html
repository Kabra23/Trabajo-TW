<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Pedidos del restaurante')}">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<header th:replace="~{fragments/layout :: header}"></header>

<main style="min-height:70vh; background:#f5f5f5; padding:2rem 0">
    <div class="container" style="max-width:1000px">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem">
            <h1 style="color:#069c6f">Pedidos recibidos</h1>
            <a th:href="@{/restaurantes/{id}(id=${restauranteId})}"
               class="btn-secondary" style="text-decoration:none">← Volver al restaurante</a>
        </div>

        <div th:replace="~{fragments/layout :: mensajes}"></div>

        <div th:if="${#lists.isEmpty(pedidos)}"
             style="text-align:center; padding:3rem; background:white; border-radius:12px">
            <p style="color:#888; font-size:1.2rem">Aún no has recibido ningún pedido.</p>
        </div>

        <div th:each="pedido : ${pedidos}"
             style="background:white; border-radius:12px; padding:1.5rem; margin-bottom:1.5rem; box-shadow:0 2px 8px rgba(0,0,0,.05)">

            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem">
                <div>
                    <strong style="color:#333">
                        Pedido #<span th:text="${pedido.id}">0</span>
                    </strong>
                    <span style="margin-left:1rem; color:#aaa; font-size:.9rem"
                          th:text="${#temporals.format(pedido.fecha, 'dd/MM/yyyy HH:mm')}">Fecha</span>
                    <br>
                    <span style="color:#555; font-size:.9rem">
                        Cliente:
                        <strong th:text="${pedido.usuario.nombre} + ' ' + ${pedido.usuario.apellidos}">Usuario</strong>
                    </span>
                </div>
                <div style="text-align:right">
                    <div style="font-size:1.4rem; font-weight:700; color:#069c6f"
                         th:text="${#numbers.formatDecimal(pedido.total,1,2)} + ' €'">0 €</div>

                    <!-- Badge de estado -->
                    <span th:switch="${pedido.estado.name()}">
                        <span th:case="'PENDIENTE'"
                              style="font-size:.8rem; background:#fff3e0; color:#f57c00; padding:.3rem .8rem; border-radius:20px; font-weight:600">
                            ⏳ Pendiente
                        </span>
                        <span th:case="'EN_PREPARACION'"
                              style="font-size:.8rem; background:#e3f2fd; color:#1565c0; padding:.3rem .8rem; border-radius:20px; font-weight:600">
                            👨‍🍳 En preparación
                        </span>
                        <span th:case="'ENVIADO'"
                              style="font-size:.8rem; background:#e8f5e9; color:#2e7d32; padding:.3rem .8rem; border-radius:20px; font-weight:600">
                            🚴 Enviado
                        </span>
                        <span th:case="'ENTREGADO'"
                              style="font-size:.8rem; background:#f3e5f5; color:#6a1b9a; padding:.3rem .8rem; border-radius:20px; font-weight:600">
                            ✅ Entregado
                        </span>
                    </span>
                </div>
            </div>

            <!-- Líneas del pedido -->
            <table style="width:100%; border-collapse:collapse; margin-bottom:1rem">
                <thead>
                    <tr style="border-bottom:2px solid #f0f0f0; color:#888; font-size:.9rem">
                        <th style="text-align:left; padding:.5rem 0">Plato</th>
                        <th style="text-align:center">Cant.</th>
                        <th style="text-align:right">Precio u.</th>
                        <th style="text-align:right">Subtotal</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="linea : ${pedido.lineas}"
                        style="border-bottom:1px solid #f5f5f5">
                        <td style="padding:.5rem 0" th:text="${linea.nombrePlato}">Plato</td>
                        <td style="text-align:center" th:text="${linea.cantidad}">1</td>
                        <td style="text-align:right"
                            th:text="${#numbers.formatDecimal(linea.precio,1,2)} + ' €'">0 €</td>
                        <td style="text-align:right; font-weight:600"
                            th:text="${#numbers.formatDecimal(linea.precio * linea.cantidad,1,2)} + ' €'">0 €</td>
                    </tr>
                </tbody>
            </table>

            <!-- Cambiar estado (propietario) -->
            <form th:action="@{/pedidos/{id}/cambiar-estado(id=${pedido.id})}" method="post"
                  style="display:flex; gap:.8rem; align-items:center; flex-wrap:wrap">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <label style="font-weight:600; color:#555">Cambiar estado:</label>
                <select name="estado"
                        style="padding:.5rem 1rem; border:2px solid #e0e0e0; border-radius:8px; font-size:.95rem">
                    <option value="PENDIENTE"
                            th:selected="${pedido.estado.name() == 'PENDIENTE'}">⏳ Pendiente</option>
                    <option value="EN_PREPARACION"
                            th:selected="${pedido.estado.name() == 'EN_PREPARACION'}">👨‍🍳 En preparación</option>
                    <option value="ENVIADO"
                            th:selected="${pedido.estado.name() == 'ENVIADO'}">🚴 Enviado</option>
                    <option value="ENTREGADO"
                            th:selected="${pedido.estado.name() == 'ENTREGADO'}">✅ Entregado</option>
                </select>
                <button type="submit" class="btn-primary"
                        style="padding:.5rem 1.2rem; font-size:.95rem">
                    Actualizar
                </button>
            </form>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
