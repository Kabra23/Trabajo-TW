<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Mis pedidos')}">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<header th:replace="~{fragments/layout :: header}"></header>

<main style="min-height:70vh; background:#f5f5f5; padding:2rem 0">
    <div class="container" style="max-width:900px">
        <h1 style="color:#069c6f; margin-bottom:1.5rem">Mis pedidos</h1>

        <div th:replace="~{fragments/layout :: mensajes}"></div>

        <div th:if="${#lists.isEmpty(pedidos)}"
             style="text-align:center; padding:3rem; background:white; border-radius:12px">
            <p style="color:#888; font-size:1.2rem">Aún no has realizado ningún pedido.</p>
            <a th:href="@{/restaurantes}" class="btn-primary" style="margin-top:1rem; display:inline-block">
                Explorar restaurantes
            </a>
        </div>

        <div th:each="pedido : ${pedidos}"
             class="pedido-card"
             style="background:white; border-radius:12px; padding:1.5rem; margin-bottom:1.5rem; box-shadow:0 2px 8px rgba(0,0,0,.05)">

            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem">
                <div>
                    <h3 style="color:#333; margin-bottom:.3rem"
                        th:text="${pedido.restaurante.nombre}">Restaurante</h3>
                    <small style="color:#aaa"
                           th:text="${#temporals.format(pedido.fecha, 'dd/MM/yyyy HH:mm')}">Fecha</small>
                </div>
                <div style="text-align:right">
                    <div style="font-size:1.4rem; font-weight:700; color:#069c6f"
                         th:text="${#numbers.formatDecimal(pedido.total,1,2)} + ' €'">0 €</div>
                    <span style="font-size:.85rem; color:#888; background:#f0f0f0; padding:.2rem .6rem; border-radius:20px"
                          th:text="${pedido.estado}">Estado</span>
                </div>
            </div>

            <!-- Líneas del pedido -->
            <table style="width:100%; border-collapse:collapse">
                <thead>
                <tr style="border-bottom:2px solid #f0f0f0; color:#888; font-size:.9rem">
                    <th style="text-align:left; padding:.5rem 0">Plato</th>
                    <th style="text-align:center">Cant.</th>
                    <th style="text-align:right">Precio</th>
                    <th style="text-align:right">Subtotal</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="linea : ${pedido.lineas}"
                    style="border-bottom:1px solid #f5f5f5">
                    <td style="padding:.5rem 0" th:text="${linea.nombrePlato}">Plato</td>
                    <td style="text-align:center" th:text="${linea.cantidad}">1</td>
                    <td style="text-align:right"
                        th:text="${#numbers.formatDecimal(linea.precio,1,2)} + ' €'">0 €</td>
                    <td style="text-align:right; font-weight:600"
                        th:text="${#numbers.formatDecimal(linea.precio * linea.cantidad,1,2)} + ' €'">0 €</td>
                </tr>
                </tbody>
            </table>

            <div style="text-align:right; margin-top:1rem">
                <a th:href="@{/restaurantes/{id}(id=${pedido.restaurante.id})}"
                   class="btn-secondary" style="font-size:.9rem">Ver restaurante</a>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
