<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CUMe y Calla - Pide comida a domicilio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;0,900;1,400&family=Syne:wght@800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link rel="stylesheet" th:href="@{/css/index.css}">
    <link rel="stylesheet" th:href="@{/css/nav.css}">
    <style>
        .hero h2 { font-family: 'Syne', 'DM Sans', sans-serif; font-weight: 800; }
        /* === HEADER VERDE === */
        .main-header .btn-secondary {
            background-color: #057a55;
            color: #ffffff;
        }
        .main-header .btn-secondary:hover {
            background-color: #046a4d;
        }
        /* === HERO SEARCH === */
        .hero-search-box { display:flex;flex-direction:column;gap:.8rem;max-width:600px; }
        .search-input-wrapper { display:flex;gap:0;border-radius:30px;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,.12);background:white; }
        .search-input-wrapper input { flex:1;border:none;padding:1rem 1.5rem;font-size:1rem;outline:none;background:transparent; }
        .search-input-wrapper button { background:#069c6f;color:white;border:none;padding:1rem 1.8rem;font-size:1rem;font-weight:700;cursor:pointer;transition:background .2s;white-space:nowrap; }
        .search-input-wrapper button:hover { background:#038a63; }
        /* Dirección del usuario logueado */
        .user-address-hint { font-size:.9rem;color:rgba(255,255,255,.85);display:flex;align-items:center;gap:.4rem; }
        .user-address-hint svg { flex-shrink:0; }
    </style>
</head>
<body>
<header th:replace="~{fragments/layout :: header}"></header>

<main>
    <section class="hero">
        <div class="hero-content">
            <div class="hero-text">
                <h2>Pide comida y mucho mas</h2>
                <p class="subtitle">Restaurantes que realizan entregas cerca de ti</p>

                <!-- Buscador de restaurantes (no de direccion) -->
                <div class="hero-search-box">
                    <!-- Si el usuario esta logueado y tiene direccion, mostramos su dir principal -->
                    <div sec:authorize="isAuthenticated()" th:if="${direccionUsuario != null}"
                         class="user-address-hint">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
                        </svg>
                        Entregando en: <strong th:text="${direccionUsuario}">Tu direccion</strong>
                    </div>

                    <form th:action="@{/restaurantes}" method="get">
                        <div class="search-input-wrapper">
                            <input type="text" name="q" placeholder="Busca un restaurante, cocina o plato..."
                                   autocomplete="off" id="heroSearch">
                            <button type="submit">Buscar</button>
                        </div>
                    </form>
                </div>
            </div>
            <div class="hero-image">
                <div class="hero-banner">
                    <h3>Lo quieres? Lo tienes</h3>
                    <div class="category-image">
                        <img th:src="@{/img/logo.png}" alt="Logo">
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Categorias populares desde BD -->
    <section class="categories-section">
        <div class="container">
            <h2>Categorias populares</h2>
            <p class="section-subtitle">Explora los tipos de cocina mas populares en tu zona</p>
            <div class="categories-grid" th:if="${categorias != null and !#lists.isEmpty(categorias)}">
                <article th:each="cat : ${categorias}" class="category-card">
                    <a th:href="@{/restaurantes(categoria=${cat.id})}" style="text-decoration:none;color:inherit;display:block">
                        <div class="category-image">
                            <img th:src="@{${@vistaImagenService.categoria(cat)}}"
                                 th:alt="${cat.nombre}" sizes="300px" class="category-icon">
                        </div>
                        <h3 th:text="${cat.nombre}">Categoria</h3>
                    </a>
                </article>
            </div>
            <div class="categories-grid" th:if="${categorias == null or #lists.isEmpty(categorias)}">
                <article class="category-card">
                    <a th:href="@{/restaurantes}" style="text-decoration:none;color:inherit;display:block">
                        <div class="category-image"><img th:src="@{/img/italiana.png}" alt="Italiana" class="category-icon"></div>
                        <h3>Italiana</h3>
                    </a>
                </article>
                <article class="category-card">
                    <a th:href="@{/restaurantes}" style="text-decoration:none;color:inherit;display:block">
                        <div class="category-image"><img th:src="@{/img/mexicana.png}" alt="Mexicana" class="category-icon"></div>
                        <h3>Mexicana</h3>
                    </a>
                </article>
                <article class="category-card">
                    <a th:href="@{/restaurantes}" style="text-decoration:none;color:inherit;display:block">
                        <div class="category-image"><img th:src="@{/img/asiatica.png}" alt="Asiatica" class="category-icon"></div>
                        <h3>Asiatica</h3>
                    </a>
                </article>
                <article class="category-card">
                    <a th:href="@{/restaurantes}" style="text-decoration:none;color:inherit;display:block">
                        <div class="category-image"><img th:src="@{/img/americana.png}" alt="Americana" class="category-icon"></div>
                        <h3>Americana</h3>
                    </a>
                </article>
                <article class="category-card">
                    <a th:href="@{/restaurantes}" style="text-decoration:none;color:inherit;display:block">
                        <div class="category-image"><img th:src="@{/img/pizza.png}" alt="Pizza" class="category-icon"></div>
                        <h3>Pizza</h3>
                    </a>
                </article>
                <article class="category-card">
                    <a th:href="@{/restaurantes}" style="text-decoration:none;color:inherit;display:block">
                        <div class="category-image"><img th:src="@{/img/cafe.png}" alt="Cafe" class="category-icon"></div>
                        <h3>Cafe</h3>
                    </a>
                </article>
            </div>
        </div>
    </section>
</main>
</body>
</html>
