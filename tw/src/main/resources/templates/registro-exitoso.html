<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro Exitoso - Just Eat CUMe</title>
    <link rel="stylesheet" th:href="@{/css/registro.css}">
</head>
<body>
    <header class="simple-header">
        <div class="container">
            <div class="logo">
                <h1>
                    <span class="logo-main">CUMe</span>
                    <span class="logo-separator">y</span>
                    <span class="logo-secondary">Calla</span>
                </h1>
            </div>
        </div>
    </header>

    <main class="auth-page">
        <section class="auth-container">
            <div class="auth-card">
                <h2>¡Registro Exitoso!</h2>

                <div style="padding:20px;background:#e8f5f1;border-radius:8px;margin:20px 0;border-left:4px solid #069c6f;">
                    <h3 style="color:#069c6f;margin-bottom:15px;">Información del Usuario</h3>
                    <p><strong>Nombre:</strong> <span th:text="${nombre}">Nombre del usuario</span></p>
                    <p><strong>Apellidos:</strong> <span th:text="${apellidos}">Apellidos del usuario</span></p>
                    <p><strong>Correo electrónico:</strong> <span th:text="${email}">email@ejemplo.com</span></p>
                </div>

                <div style="text-align:center;margin-top:30px;">
                    <a th:href="@{/login}" class="btn-submit"
                       style="display:inline-block;text-decoration:none;margin:10px;padding:1rem 2rem;">
                        Iniciar Sesión
                    </a>
                    <a th:href="@{/}" class="btn-submit"
                       style="display:inline-block;text-decoration:none;margin:10px;padding:1rem 2rem;background:linear-gradient(135deg,#555,#333);">
                        Volver al Inicio
                    </a>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
