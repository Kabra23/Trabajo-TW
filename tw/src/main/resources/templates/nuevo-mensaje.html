<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuevo mensaje - CUMe y Calla</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <style>
        body { background:#f5f7fa;font-family:'Segoe UI',sans-serif;margin:0; }
        .main-header { background:#069c6f; }
        .main-header .logo-main,.main-header nav a,.main-header .logo-separator,.main-header .logo-secondary { color:white; }
        .btn-logout { background:transparent;color:#fff;border:2px solid rgba(255,255,255,.75);padding:.45rem 1.1rem;border-radius:25px;cursor:pointer;font-family:inherit;font-size:.95rem;font-weight:600; }

        .page-wrap { max-width:680px;margin:2rem auto;padding:0 1.5rem; }
        .form-card { background:white;border-radius:14px;padding:2.2rem;box-shadow:0 2px 12px rgba(0,0,0,.07); }
        .form-card h1 { color:#069c6f;font-size:1.6rem;margin:0 0 1.8rem; }

        .form-field { margin-bottom:1.2rem; }
        .form-field label { display:block;font-weight:600;color:#333;margin-bottom:.45rem;font-size:.92rem; }
        .form-field input,.form-field textarea {
            width:100%;padding:.8rem 1rem;border:2px solid #e0e0e0;border-radius:8px;
            font-size:.95rem;font-family:inherit;transition:border-color .2s;box-sizing:border-box;
        }
        .form-field input:focus,.form-field textarea:focus { outline:none;border-color:#069c6f;box-shadow:0 0 0 3px rgba(6,156,111,.1); }
        .form-field textarea { resize:vertical;min-height:160px; }
        .form-field small { color:#888;font-size:.8rem;display:block;margin-top:.3rem; }
        .error-msg { color:#d32f2f;font-size:.83rem;display:block;margin-top:.3rem; }

        .form-actions { display:flex;gap:.8rem;justify-content:flex-end;margin-top:1.5rem;padding-top:1.2rem;border-top:1px solid #f0f0f0; }
        .btn-send { background:#069c6f;color:white;border:none;padding:.8rem 2rem;border-radius:8px;font-weight:700;cursor:pointer;font-family:inherit;font-size:.95rem;transition:background .2s; }
        .btn-send:hover { background:#038a63; }
        .btn-cancel-link { background:#f5f5f5;color:#555;border:2px solid #e0e0e0;padding:.75rem 1.5rem;border-radius:8px;font-weight:600;text-decoration:none;font-size:.95rem; }
        .btn-cancel-link:hover { border-color:#999; }

        .msg-err { background:#ffebee;color:#d32f2f;padding:1rem;border-radius:8px;border-left:4px solid #d32f2f;margin-bottom:1rem; }
    </style>
</head>
<body>
<header class="main-header">
    <div class="container">
        <div class="logo">
            <a th:href="@{/}" style="text-decoration:none">
                <h1><span class="logo-main">CUMe</span><span class="logo-separator">y</span><span class="logo-secondary">Calla</span></h1>
            </a>
        </div>
        <nav class="main-nav">
            <ul>
                <li><a th:href="@{/restaurantes}">Restaurantes</a></li>
                <li><a th:href="@{/mensajes}">Mensajes</a></li>
                <li><a th:href="@{/perfil}"><span sec:authentication="name">Mi perfil</span></a></li>
                <li>
                    <form th:action="@{/logout}" method="post" style="display:inline">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <button type="submit" class="btn-logout">Cerrar sesion</button>
                    </form>
                </li>
            </ul>
        </nav>
    </div>
</header>

<main class="page-wrap">
    <div class="form-card">
        <h1>Nuevo mensaje</h1>

        <div th:if="${error}" class="msg-err" th:text="${error}"></div>

        <form th:action="@{/mensajes/enviar}" method="post" novalidate>
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

            <div class="form-field">
                <label for="destinatario">Para (email del destinatario) *</label>
                <input type="email" id="destinatario" name="destinatario"
                       th:value="${para}" required
                       placeholder="correo@ejemplo.com">
                <small>El destinatario debe tener una cuenta en CUMe y Calla.</small>
            </div>

            <div class="form-field">
                <label for="asunto">Asunto</label>
                <input type="text" id="asunto" name="asunto"
                       placeholder="Escribe el asunto...">
            </div>

            <div class="form-field">
                <label for="contenido">Mensaje *</label>
                <textarea id="contenido" name="contenido" required
                          placeholder="Escribe tu mensaje aqui..."></textarea>
            </div>

            <div class="form-actions">
                <a th:href="@{/mensajes}" class="btn-cancel-link">Cancelar</a>
                <button type="submit" class="btn-send">Enviar mensaje</button>
            </div>
        </form>
    </div>
</main>
</body>
</html>
