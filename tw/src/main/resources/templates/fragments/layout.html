<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:fragment="head(titulo)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${titulo} + ' - CUMe y Calla'">CUMe y Calla</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;0,900;1,400&family=Syne:wght@800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link rel="stylesheet" th:href="@{/css/nav.css}">
</head>

<header th:fragment="header" class="main-header">
    <div class="container">
        <div class="logo">
            <a th:href="@{/}" style="text-decoration:none">
                <h1>
                    <span class="logo-main">CUMe</span>
                    <span class="logo-separator">y</span>
                    <span class="logo-secondary">Calla</span>
                </h1>
            </a>
        </div>
        <nav class="main-nav">
            <ul>
                <li><a th:href="@{/restaurantes}">Restaurantes</a></li>
                <li class="nav-dropdown" sec:authorize="isAuthenticated()">
                    <button class="nav-dropdown-btn" type="button">
                        Mi restaurante <span class="dropdown-arrow">&#9660;</span>
                    </button>
                    <ul class="nav-dropdown-menu">
                        <li><a th:href="@{/mis-restaurantes}">Ver mis restaurantes</a></li>
                        <li><a th:href="@{/restaurantes/nuevo}">+ Crear nuevo</a></li>
                    </ul>
                </li>
                <li sec:authorize="isAuthenticated()">
                    <a th:href="@{/pedidos/mis-pedidos}">Mis pedidos</a>
                </li>
                <li class="nav-dropdown" sec:authorize="hasRole('ROLE_ADMIN')">
                    <button class="nav-dropdown-btn" type="button">
                        Admin <span class="dropdown-arrow">&#9660;</span>
                    </button>
                    <ul class="nav-dropdown-menu">
                        <li><a th:href="@{/categorias}">Categorias</a></li>
                        <li><a th:href="@{/usuarios}">Usuarios</a></li>
                    </ul>
                </li>
                <li sec:authorize="isAuthenticated()">
                    <a th:href="@{/perfil}">
                        <span sec:authentication="name">Usuario</span>
                    </a>
                </li>
                <li sec:authorize="isAuthenticated()">
                    <form th:action="@{/logout}" method="post" style="display:inline">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <button type="submit" class="btn-logout">Cerrar sesion</button>
                    </form>
                </li>
                <li sec:authorize="!isAuthenticated()">
                    <a th:href="@{/login}" class="btn-secondary">Inicia sesion</a>
                </li>
                <li sec:authorize="!isAuthenticated()">
                    <a th:href="@{/registro}" class="btn-primary">Registrate</a>
                </li>
            </ul>
        </nav>
    </div>
    <script>
    (function () {
        function initDropdowns() {
            var dropdowns = document.querySelectorAll('.nav-dropdown');
            dropdowns.forEach(function (dd) {
                var btn  = dd.querySelector('.nav-dropdown-btn');
                var menu = dd.querySelector('.nav-dropdown-menu');
                if (!btn || !menu) return;
                btn.addEventListener('click', function (e) {
                    e.stopPropagation();
                    var isOpen = menu.classList.contains('open');
                    /* cerrar todos primero */
                    document.querySelectorAll('.nav-dropdown-menu').forEach(function (m) { m.classList.remove('open'); });
                    document.querySelectorAll('.nav-dropdown-btn').forEach(function (b) { b.classList.remove('open'); });
                    /* abrir el pulsado si estaba cerrado */
                    if (!isOpen) {
                        menu.classList.add('open');
                        btn.classList.add('open');
                    }
                });
                menu.addEventListener('click', function (e) { e.stopPropagation(); });
            });
            document.addEventListener('click', function () {
                document.querySelectorAll('.nav-dropdown-menu').forEach(function (m) { m.classList.remove('open'); });
                document.querySelectorAll('.nav-dropdown-btn').forEach(function (b) { b.classList.remove('open'); });
            });
        }
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initDropdowns);
        } else {
            initDropdowns();
        }
    })();
    </script>
</header>

<div th:fragment="mensajes">
    <div th:if="${exito}" class="alert alert-success" th:text="${exito}"></div>
    <div th:if="${error}"  class="alert alert-error"   th:text="${error}"></div>
</div>

<footer th:fragment="footer" class="main-footer">
    <div class="container">
        <p>2025 CUMe y Calla - Proyecto Tecnologias Web UEx</p>
    </div>
</footer>

</html>
