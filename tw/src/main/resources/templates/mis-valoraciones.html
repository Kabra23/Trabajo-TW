<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Mis valoraciones')}">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<header th:replace="~{fragments/layout :: header}"></header>

<main style="min-height:70vh; background:#f5f5f5; padding:2rem 0">
    <div class="container" style="max-width:800px">
        <h1 style="color:#069c6f; margin-bottom:1.5rem">Mis valoraciones</h1>

        <div th:replace="~{fragments/layout :: mensajes}"></div>

        <div th:if="${#lists.isEmpty(valoraciones)}"
             style="text-align:center; padding:3rem; background:white; border-radius:12px">
            <p style="color:#888; font-size:1.2rem">Aún no has valorado ningún restaurante.</p>
            <a th:href="@{/restaurantes}" class="btn-primary"
               style="margin-top:1rem; display:inline-block; text-decoration:none">
                Explorar restaurantes
            </a>
        </div>

        <div th:each="val : ${valoraciones}"
             style="background:white; border-radius:12px; padding:1.5rem; margin-bottom:1rem; box-shadow:0 2px 8px rgba(0,0,0,.05)">
            <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:.8rem">
                <div>
                    <a th:href="@{/restaurantes/{id}(id=${val.restaurante.id})}"
                       th:text="${val.restaurante.nombre}"
                       style="color:#069c6f; font-weight:700; font-size:1.1rem; text-decoration:none">
                        Restaurante
                    </a>
                    <br>
                    <small style="color:#aaa"
                           th:text="${#temporals.format(val.fecha, 'dd/MM/yyyy')}">Fecha</small>
                </div>
                <div style="display:flex; gap:.2rem; align-items:center">
                    <span th:each="n : ${#numbers.sequence(1,5)}"
                          th:text="${n <= val.puntuacion} ? '⭐' : '☆'"
                          style="font-size:1.2rem"></span>
                    <strong style="color:#069c6f; margin-left:.5rem"
                            th:text="${val.puntuacion} + '/5'">5/5</strong>
                </div>
            </div>

            <p th:if="${val.comentario}" th:text="${val.comentario}"
               style="color:#555; line-height:1.6; margin:0 0 1rem 0"></p>
            <p th:unless="${val.comentario}"
               style="color:#aaa; font-style:italic; margin:0 0 1rem 0">Sin comentario</p>

            <!-- Acciones -->
            <div style="display:flex; gap:.8rem; flex-wrap:wrap">
                <!-- Editar valoración -->
                <form th:action="@{/valoraciones/{id}/editar(id=${val.id})}" method="post"
                      style="display:inline">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <input type="hidden" name="puntuacion" th:value="${val.puntuacion}">
                    <input type="hidden" name="comentario" th:value="${val.comentario}">
                    <!-- Botón que lleva a edición in-place via redirect al restaurante -->
                    <a th:href="@{/restaurantes/{id}(id=${val.restaurante.id})}"
                       class="btn-secondary"
                       style="font-size:.85rem; padding:.5rem 1rem; text-decoration:none; border:2px solid #e0e0e0; border-radius:8px; color:#666">
                        Ver restaurante
                    </a>
                </form>

                <!-- Eliminar valoración -->
                <form th:action="@{/valoraciones/{id}/eliminar(id=${val.id})}" method="post"
                      onsubmit="return confirm('¿Eliminar esta valoración?')">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button type="submit"
                            style="background:#d32f2f; color:white; border:none; padding:.5rem 1rem; border-radius:8px; cursor:pointer; font-size:.85rem; font-weight:600">
                        Eliminar
                    </button>
                </form>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
