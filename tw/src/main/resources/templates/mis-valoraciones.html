<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis valoraciones - CUMe y Calla</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;0,900;1,400&family=Syne:wght@800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link rel="stylesheet" th:href="@{/css/nav.css}">
    <style>
        body { background: #f5f5f5; }
        .page-wrap { max-width: 800px; margin: 2rem auto; padding: 0 1.5rem; }
        h1{color:#069c6f;margin-bottom:1.5rem}
        .val-card{background:white;border-radius:12px;padding:1.2rem 1.5rem;margin-bottom:1rem;box-shadow:0 2px 8px rgba(0,0,0,.05);display:flex;flex-direction:column;gap:.5rem}
        .val-header{display:flex;justify-content:space-between;align-items:center}
        .val-restaurante{color:#069c6f;font-weight:700;text-decoration:none;font-size:1.05rem}
        .val-restaurante:hover{text-decoration:underline}
        .stars{display:flex;gap:.15rem}
        .star{width:18px;height:18px;fill:#d0d0d0}
        .star.on{fill:#ffd700}
        .val-comentario{color:#555;font-size:.93rem;line-height:1.5}
        .val-fecha{color:#aaa;font-size:.82rem}
        .val-actions{display:flex;gap:.5rem;margin-top:.5rem}
        .btn-edit-val{background:#e8f5f1;color:#069c6f;border:2px solid #069c6f;padding:.35rem .9rem;border-radius:8px;text-decoration:none;font-size:.85rem;font-weight:600}
        .btn-delete-val{background:#ffebee;color:#d32f2f;border:2px solid #d32f2f;padding:.35rem .9rem;border-radius:8px;cursor:pointer;font-size:.85rem;font-weight:600}
        .msg-ok{background:#e8f5f1;color:#069c6f;padding:1rem;border-radius:8px;border-left:4px solid #069c6f;margin-bottom:1rem}
        .empty{text-align:center;padding:3rem;color:#888}
        /* Modal editar */
        .modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:1000;align-items:center;justify-content:center}
        .modal-overlay.open{display:flex}
        .modal{background:white;border-radius:16px;padding:2rem;width:90%;max-width:480px;box-shadow:0 20px 60px rgba(0,0,0,.2)}
        .modal h2{color:#069c6f;margin-bottom:1.2rem}
        .star-edit{display:flex;gap:.3rem;margin-bottom:1rem}
        .star-edit svg{width:36px;height:36px;fill:#d0d0d0;cursor:pointer;transition:fill .15s}
        .star-edit svg.on{fill:#069c6f}
        .modal textarea{width:100%;padding:.8rem;border:2px solid #e0e0e0;border-radius:8px;resize:vertical;font-family:inherit;font-size:.95rem;margin-bottom:1rem}
        .modal textarea:focus{outline:none;border-color:#069c6f}
        .modal-actions{display:flex;gap:.8rem;justify-content:flex-end}
        .btn-cancel-modal{background:#f0f0f0;color:#555;border:none;padding:.6rem 1.2rem;border-radius:25px;cursor:pointer;font-weight:600}
        .btn-save-modal{background:#069c6f;color:white;border:none;padding:.6rem 1.5rem;border-radius:25px;cursor:pointer;font-weight:700}
    </style>
</head>
<body>
<header th:replace="~{fragments/layout :: header}"></header>

<div class="page-wrap">
    <h1>Mis valoraciones</h1>

    <div th:if="${exito}" class="msg-ok" th:text="${exito}"></div>

    <!-- Sin valoraciones -->
    <div th:if="${valoraciones == null or #lists.isEmpty(valoraciones)}" class="empty">
        <p>Aun no has valorado ningun restaurante.</p>
        <a th:href="@{/restaurantes}" style="color:#069c6f;font-weight:600;">Descubrir restaurantes</a>
    </div>

    <!-- Lista de valoraciones -->
    <div th:each="val : ${valoraciones}" class="val-card">
        <div class="val-header">
            <a th:href="@{/restaurantes/{id}(id=${val.restaurante.id})}"
               class="val-restaurante" th:text="${val.restaurante.nombre}">Restaurante</a>
            <!-- Estrellas dinamicas -->
            <div class="stars">
                <svg th:each="i : ${#numbers.sequence(1,5)}"
                     th:classappend="${i <= val.puntuacion} ? ' on' : ''"
                     class="star" viewBox="0 0 24 24">
                    <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
                </svg>
            </div>
        </div>
        <p th:if="${val.comentario}" class="val-comentario" th:text="${val.comentario}">Comentario</p>
        <span class="val-fecha" th:text="${#temporals.format(val.fecha,'dd/MM/yyyy')}">Fecha</span>
        <!-- Acciones: editar y eliminar -->
        <div class="val-actions">
            <button class="btn-edit-val"
                    th:data-id="${val.id}"
                    th:data-puntuacion="${val.puntuacion}"
                    th:data-comentario="${val.comentario}"
                    onclick="abrirModal(this)">Editar</button>
            <form th:action="@{/valoraciones/{id}/eliminar(id=${val.id})}" method="post" style="display:inline"
                  onsubmit="return confirm('Eliminar esta valoracion?')">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit" class="btn-delete-val">Eliminar</button>
            </form>
        </div>
    </div>
</div>

<!-- Modal editar valoracion -->

<div class="modal-overlay" id="editModal">
    <div class="modal">
        <h2>Editar valoracion</h2>
        <form id="editForm" method="post">
            <input type="hidden" id="csrfToken" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <input type="hidden" id="puntuacionHidden" name="puntuacion" value="0">
            <div class="star-edit" id="starEditor">
                <svg data-val="1" viewBox="0 0 24 24" onclick="setStarEdit(1)"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                <svg data-val="2" viewBox="0 0 24 24" onclick="setStarEdit(2)"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                <svg data-val="3" viewBox="0 0 24 24" onclick="setStarEdit(3)"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                <svg data-val="4" viewBox="0 0 24 24" onclick="setStarEdit(4)"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                <svg data-val="5" viewBox="0 0 24 24" onclick="setStarEdit(5)"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
            </div>
            <textarea name="comentario" id="editComentario" rows="4" placeholder="Escribe tu comentario (opcional)..."></textarea>
            <div class="modal-actions">
                <button type="button" class="btn-cancel-modal" onclick="cerrarModal()">Cancelar</button>
                <button type="submit" class="btn-save-modal">Guardar</button>
            </div>
        </form>
    </div>
</div>

<script>
var editModal = document.getElementById('editModal');
var editForm = document.getElementById('editForm');
var puntuacionHidden = document.getElementById('puntuacionHidden');
var editComentario = document.getElementById('editComentario');

function abrirModal(btn) {
    var id = btn.dataset.id;
    var puntuacion = parseInt(btn.dataset.puntuacion);
    var comentario = btn.dataset.comentario || '';
    editForm.action = '/valoraciones/' + id + '/editar';
    editComentario.value = comentario;
    setStarEdit(puntuacion);
    editModal.classList.add('open');
}
function cerrarModal() {
    editModal.classList.remove('open');
}
function setStarEdit(val) {
    puntuacionHidden.value = val;
    document.querySelectorAll('#starEditor svg').forEach(function(svg) {
        svg.classList.toggle('on', parseInt(svg.dataset.val) <= val);
    });
}
editModal.addEventListener('click', function(e) {
    if (e.target === editModal) cerrarModal();
});
</script>
</body>
</html>
