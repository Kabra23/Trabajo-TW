<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión - CUMe y Calla</title>
    <link rel="stylesheet" th:href="@{/css/login.css}">
</head>
<body>
<header class="simple-header">
    <div class="container">
        <a th:href="@{/}" class="back-link">← Volver</a>
        <div class="logo">
            <h1>
                <span class="logo-main">CUMe</span>
                <span class="logo-separator">y</span>
                <span class="logo-secondary">Calla</span>
            </h1>
        </div>
    </div>
</header>

<main class="auth-page">
    <section class="auth-container">
        <div class="auth-card">
            <h2>Iniciar sesión</h2>

            <!-- Mensaje de error de Spring Security -->
            <div th:if="${param.error}" class="alert-error"
                 style="background:#ffebee; color:#d32f2f; padding:1rem; border-radius:8px; margin-bottom:1.5rem; text-align:center; font-weight:600;">
                Email o contraseña incorrectos. Inténtalo de nuevo.
            </div>
            <!-- Mensaje de éxito tras registro -->
            <div th:if="${exito}" class="alert-success"
                 style="background:#e8f5e9; color:#069c6f; padding:1rem; border-radius:8px; margin-bottom:1.5rem; text-align:center; font-weight:600;"
                 th:text="${exito}">
            </div>

            <!-- Formulario conectado a Spring Security -->
            <form th:action="@{/login}" method="post" id="loginForm" novalidate>
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                <div class="form-group">
                    <label for="username">Correo electrónico</label>
                    <input
                        type="email"
                        id="username"
                        name="username"
                        placeholder="correo@ejemplo.com"
                        autocomplete="email"
                        required
                    >
                    <span class="error-message" id="emailError"></span>
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <div class="password-wrapper">
                        <input
                            type="password"
                            id="password"
                            name="password"
                            placeholder="Tu contraseña"
                            autocomplete="current-password"
                            required
                        >
                        <button type="button" class="toggle-password" aria-label="Mostrar/ocultar contraseña">
                            <span>
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <line x1="1" y1="1" x2="23" y2="23"></line>
                                    <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                                </svg>
                            </span>
                        </button>
                    </div>
                    <span class="error-message" id="passwordError"></span>
                </div>

                <button type="submit" class="btn-submit">Iniciar sesión</button>

                <div class="auth-links">
                    <a href="#" class="forgot-password">¿Olvidaste tu contraseña?</a>
                </div>

                <div class="auth-footer">
                    <p>¿No tienes cuenta? <a th:href="@{/registro}" class="register-link">Regístrate</a></p>
                </div>
            </form>
        </div>
    </section>
</main>

<script th:src="@{/js/login.js}"></script>
</body>
</html>
