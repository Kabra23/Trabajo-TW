<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión - Just Eat CUMe</title>
    <link rel="stylesheet" th:href="@{/css/login.css}">
</head>
<body>
<header class="simple-header">
    <div class="container">
        <a th:href="@{/}" class="back-link">← Volver</a>
        <div class="logo">
            <h1>
                <span class="logo-main">CUMe</span>
                <span class="logo-separator">y</span>
                <span class="logo-secondary">Calla</span>
            </h1>
        </div>
    </div>
</header>

<main class="auth-page">
    <section class="auth-container">
        <div class="auth-card">
            <h2>Iniciar sesión</h2>

            <form id="loginForm" novalidate>
                <div class="form-group">
                    <label for="email">Correo electrónico</label>
                    <input
                            type="email"
                            id="email"
                            name="email"
                            placeholder="Correo electrónico"
                            required
                    >
                    <span class="error-message" id="emailError"></span>
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <div class="password-wrapper">
                        <input
                                type="password"
                                id="password"
                                name="password"
                                placeholder="Contraseña"
                                required
                        >
                        <button type="button" class="toggle-password" aria-label="Mostrar contraseña">
                            <span>👁</span>
                        </button>
                    </div>
                    <span class="error-message" id="passwordError"></span>
                </div>

                <button type="submit" class="btn-submit">Iniciar sesión</button>

                <div class="auth-links">
                    <a href="#" class="forgot-password">¿Olvidaste tu contraseña?</a>
                </div>

                <div class="auth-footer">
                    <p>¿No tienes cuenta? <a th:href="@{/registro}" class="register-link">Regístrate</a></p>
                </div>
            </form>
        </div>
    </section>
</main>

<footer class="main-footer">
    <div class="container">
        <p>&copy; 2026 Just Eat CUMe - Proyecto Tecnologías Web</p>
    </div>
</footer>

<script>
    // Toggle password visibility
    document.querySelectorAll('.toggle-password').forEach(button => {
        button.addEventListener('click', function() {
            const passwordInput = document.getElementById('password');
            const icon = this.querySelector('span');

            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.textContent = '🙈';
            } else {
                passwordInput.type = 'password';
                icon.textContent = '👁';
            }
        });
    });

    // Form validation
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();

        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;

        let isValid = true;

        // Clear previous errors
        document.querySelectorAll('.error-message').forEach(error => error.textContent = '');

        // Validate email
        if (!email) {
            document.getElementById('emailError').textContent = 'El correo electrónico es obligatorio';
            isValid = false;
        } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
            document.getElementById('emailError').textContent = 'Introduce un correo electrónico válido';
            isValid = false;
        }

        // Validate password
        if (!password) {
            document.getElementById('passwordError').textContent = 'La contraseña es obligatoria';
            isValid = false;
        }

        if (isValid) {
            alert('Inicio de sesión exitoso (simulado)');
            // Aquí iría la lógica real de login
        }
    });
</script>

</body>
</html>
