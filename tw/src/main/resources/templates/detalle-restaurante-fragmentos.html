<!-- =====================================================================
   INSTRUCCIONES DE INTEGRACIÓN EN detalle-restaurante.html
   =====================================================================

   1. En el modelo Restaurante, añade el campo etiquetasMenu (ya en Restaurante.java nuevo).

   2. Reemplaza el bloque <nav class="menu-tabs">...</nav> existente por el de abajo.

   3. Añade la sección de restaurantes relacionados ANTES del cierre de </main> / después del bloque .detail-layout.

   4. Añade el script de tabs editables en JS al final del body.
   ===================================================================== -->


<!-- ====== TABS DEL MENÚ EDITABLES (reemplaza el <nav class="menu-tabs"> actual) ====== -->

<!-- Ver para todos: tabs normales con las etiquetas del restaurante -->
<nav class="menu-tabs" id="menuTabs">
    <button class="tab-btn active" th:each="etiqueta, it : ${restaurante.etiquetasMenuLista}"
            th:data-tab="${etiqueta}"
            th:text="${etiqueta}"
            th:classappend="${it.first} ? ' active' : ''"
            onclick="switchTab(this)">Etiqueta</button>
</nav>

<!-- Panel de edición de etiquetas (solo propietario) -->
<div th:if="${esPropietario}"
     id="editTabsPanel"
     style="margin-bottom:1rem;background:#f0fbf7;border:2px dashed #069c6f;border-radius:10px;padding:1.2rem;display:none;">
    <p style="margin:0 0 .7rem;font-weight:600;color:#069c6f;font-size:.9rem;">Editar etiquetas del menu</p>
    <form th:action="@{/restaurantes/{id}/etiquetas(id=${restaurante.id})}" method="post"
          style="display:flex;gap:.7rem;align-items:center;flex-wrap:wrap;">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <input type="text" name="etiquetasMenu"
               th:value="${restaurante.etiquetasMenu}"
               placeholder="Ej: Destacados,Desayunos,Bocadillos,Bebidas,Ensaladas"
               style="flex:1;min-width:240px;padding:.65rem .9rem;border:2px solid #069c6f;border-radius:8px;font-family:inherit;font-size:.9rem;">
        <small style="color:#888;font-size:.78rem;display:block;width:100%;margin-top:-.3rem;">
            Escribe las etiquetas separadas por comas. Deja vacio para usar las predeterminadas.
        </small>
        <button type="submit"
                style="background:#069c6f;color:white;border:none;padding:.65rem 1.4rem;border-radius:8px;font-weight:700;cursor:pointer;font-family:inherit;font-size:.9rem;">
            Guardar etiquetas
        </button>
        <button type="button" onclick="toggleEditTabs()"
                style="background:white;color:#555;border:2px solid #e0e0e0;padding:.6rem 1rem;border-radius:8px;cursor:pointer;font-family:inherit;font-size:.9rem;">
            Cancelar
        </button>
    </form>
</div>

<!-- Botón "Editar tabs" visible solo para el propietario -->
<div th:if="${esPropietario}" style="margin-bottom:.8rem;">
    <button onclick="toggleEditTabs()"
            style="background:none;border:none;color:#069c6f;font-size:.83rem;font-weight:600;cursor:pointer;font-family:inherit;text-decoration:underline;padding:0;">
        Editar etiquetas del menu
    </button>
</div>


<!-- ====== SECCIÓN DE RESTAURANTES RELACIONADOS ====== -->
<!-- Insertar después del cierre de </div><!-- .detail-layout --> y antes de </main> -->

<section th:if="${relacionados != null and !#lists.isEmpty(relacionados)}"
         style="margin-top:2.5rem;padding-top:2rem;border-top:2px solid #f0f0f0;">
    <div class="container">
        <h2 style="color:#333;font-size:1.4rem;margin-bottom:1.2rem;font-weight:700;">
            Restaurantes similares
        </h2>
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:1.2rem;">
            <a th:each="r : ${relacionados}"
               th:href="@{/restaurantes/{id}(id=${r.id})}"
               style="background:white;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.07);text-decoration:none;color:inherit;border:2px solid transparent;transition:all .2s;display:block;">
                <div th:onmouseover="this.style.borderColor='#069c6f'"
                     th:onmouseout="this.style.borderColor='transparent'">
                    <!-- Imagen -->
                    <div style="height:130px;overflow:hidden;background:#e8f5f1;display:flex;align-items:center;justify-content:center;">
                        <img th:if="${r.imagen != null}"
                             th:src="@{'/uploads/' + ${r.imagen}}" th:alt="${r.nombre}"
                             style="width:100%;height:100%;object-fit:cover;">
                        <svg th:unless="${r.imagen != null}" width="40" height="40" viewBox="0 0 24 24" fill="#069c6f" style="opacity:.3;">
                            <path d="M18.06 22.99h1.66c.84 0 1.53-.64 1.63-1.46L23 5.05h-5V1h-1.97v4.05h-4.97l.3 2.34c1.71.47 3.31 1.32 4.27 2.26 1.44 1.42 2.43 2.89 2.43 5.29v8.05z"/>
                        </svg>
                    </div>
                    <!-- Info -->
                    <div style="padding:1rem;">
                        <h3 style="margin:0 0 .3rem;font-size:1rem;color:#333;font-weight:700;" th:text="${r.nombre}">Nombre</h3>
                        <div style="display:flex;align-items:center;gap:.3rem;font-size:.85rem;color:#666;">
                            <svg th:if="${r.mediaValoraciones != null and r.mediaValoraciones > 0}"
                                 width="12" height="12" viewBox="0 0 24 24" fill="gold">
                                <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
                            </svg>
                            <span th:if="${r.mediaValoraciones != null and r.mediaValoraciones > 0}"
                                  th:text="${#numbers.formatDecimal(r.mediaValoraciones,1,1)}"
                                  style="font-weight:700;color:#333;">0.0</span>
                            <span th:if="${r.localidad != null and !#strings.isEmpty(r.localidad)}" style="color:#aaa;" th:text="'· ' + ${r.localidad}">localidad</span>
                        </div>
                        <div th:if="${r.categorias != null and !#lists.isEmpty(r.categorias)}"
                             style="margin-top:.4rem;display:flex;flex-wrap:wrap;gap:.25rem;">
                            <span th:each="cat : ${r.categorias}"
                                  th:text="${cat.nombre}"
                                  style="background:#e8f5f1;color:#069c6f;border-radius:10px;padding:.1rem .5rem;font-size:.72rem;font-weight:600;">Cat</span>
                        </div>
                        <span th:unless="${r.aceptaPedidos}"
                              style="display:inline-block;margin-top:.5rem;background:#ffebee;color:#d32f2f;border-radius:10px;padding:.15rem .6rem;font-size:.72rem;font-weight:600;">
                            No acepta pedidos
                        </span>
                    </div>
                </div>
            </a>
        </div>
    </div>
</section>


<!-- ====== SCRIPT PARA TABS Y EDICIÓN ====== -->
<!-- Añadir al final del <body>, justo antes o después del bloque de script de estrelllas/cesta -->
<script>
// --- Cambiar tab activa ---
function switchTab(btn) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
}

// --- Mostrar/ocultar panel de edición de etiquetas ---
function toggleEditTabs() {
    var panel = document.getElementById('editTabsPanel');
    if (panel) {
        panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
    }
}
</script>
