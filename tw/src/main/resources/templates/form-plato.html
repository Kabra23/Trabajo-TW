<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Plato')}">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<header th:replace="~{fragments/layout :: header}"></header>
<main style="min-height:70vh; background:#f5f5f5; padding:2rem 0">
    <div class="container" style="max-width:600px">
        <h1 style="color:#069c6f; margin-bottom:1.5rem">
            <span th:if="${plato.id == null}">Nuevo plato</span>
            <span th:unless="${plato.id == null}">Editar plato</span>
            <small style="font-size:1rem; color:#888"> — <span th:text="${restaurante.nombre}"></span></small>
        </h1>

        <div style="background:white; border-radius:12px; padding:2rem; box-shadow:0 2px 8px rgba(0,0,0,.05)">
            <form th:action="${plato.id == null}
                      ? @{/restaurantes/{id}/platos/nuevo(id=${restaurante.id})}
                      : @{/restaurantes/{rid}/platos/{pid}/editar(rid=${restaurante.id},pid=${plato.id})}"
                  method="post" enctype="multipart/form-data">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                <div class="form-group" style="margin-bottom:1rem">
                    <label style="font-weight:600; display:block; margin-bottom:.4rem">Nombre del plato *</label>
                    <input type="text" name="nombre" th:value="${plato.nombre}" required
                           style="width:100%; padding:.8rem; border:2px solid #e0e0e0; border-radius:8px">
                </div>

                <div class="form-group" style="margin-bottom:1rem">
                    <label style="font-weight:600; display:block; margin-bottom:.4rem">Descripción</label>
                    <textarea name="descripcion" rows="3"
                              style="width:100%; padding:.8rem; border:2px solid #e0e0e0; border-radius:8px"
                              th:text="${plato.descripcion}"></textarea>
                </div>

                <div class="form-group" style="margin-bottom:1rem">
                    <label style="font-weight:600; display:block; margin-bottom:.4rem">Precio (€) *</label>
                    <input type="number" name="precio" th:value="${plato.precio}"
                           min="0" step="0.01" required
                           style="width:100%; padding:.8rem; border:2px solid #e0e0e0; border-radius:8px">
                </div>

                <div class="form-group" style="margin-bottom:1.5rem">
                    <label style="font-weight:600; display:block; margin-bottom:.4rem">Imagen (opcional)</label>
                    <input type="file" name="imagenFile" accept="image/jpeg,image/png,image/webp">
                    <img th:if="${plato.imagen != null}"
                         th:src="@{'/uploads/' + ${plato.imagen}}"
                         style="margin-top:.5rem; max-height:100px; border-radius:8px">
                </div>

                <div style="display:flex; gap:1rem; justify-content:flex-end">
                    <a th:href="@{/restaurantes/{id}(id=${restaurante.id})}"
                       style="padding:.8rem 1.5rem; border:2px solid #e0e0e0; border-radius:8px; text-decoration:none; color:#666">
                        Cancelar
                    </a>
                    <button type="submit" class="btn-primary">
                        <span th:if="${plato.id == null}">Añadir plato</span>
                        <span th:unless="${plato.id == null}">Guardar cambios</span>
                    </button>
                </div>
            </form>
        </div>
    </div>
</main>
<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
