<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Plato')}" th:with="extraCss=~{::link}">
    <link rel="stylesheet" th:href="@{/css/base.css}">
</head>
<body>
<header th:replace="~{fragments/layout :: header}"></header>
<main>
    <div class="container">
        <div class="form-container">
            <h1 class="page-title">
                <span th:if="${plato.id == null}">Nuevo plato</span>
                <span th:unless="${plato.id == null}">Editar plato</span>
                <small class="text-muted"> — <span th:text="${restaurante.nombre}"></span></small>
            </h1>

            <form th:action="${plato.id == null}
                      ? @{/restaurantes/{id}/platos/nuevo(id=${restaurante.id})}
                      : @{/restaurantes/{rid}/platos/{pid}/editar(rid=${restaurante.id},pid=${plato.id})}"
                  method="post" enctype="multipart/form-data">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                <div class="form-group">
                    <label for="nombre">Nombre del plato *</label>
                    <input type="text" id="nombre" name="nombre" th:value="${plato.nombre}" required class="form-control">
                </div>

                <div class="form-group">
                    <label for="descripcion">Descripción</label>
                    <textarea id="descripcion" name="descripcion" rows="3" class="form-control" th:text="${plato.descripcion}"></textarea>
                </div>

                <div class="form-group">
                    <label for="precio">Precio (€) *</label>
                    <input type="number" id="precio" name="precio" th:value="${plato.precio}" min="0" step="0.01" required class="form-control">
                </div>

                <div class="form-group">
                    <label for="imagenFile">Imagen (opcional)</label>
                    <input type="file" id="imagenFile" name="imagenFile" accept="image/jpeg,image/png,image/webp" class="form-control">
                    <img th:if="${plato.imagen != null}" th:src="@{'/uploads/' + ${plato.imagen}}" style="margin-top:.5rem; max-height:100px; border-radius:8px">
                </div>

                <div class="form-actions">
                    <a th:href="@{/restaurantes/{id}(id=${restaurante.id})}" class="btn btn-cancel">
                        Cancelar
                    </a>
                    <button type="submit" class="btn btn-primary">
                        <span th:if="${plato.id == null}">Añadir plato</span>
                        <span th:unless="${plato.id == null}">Guardar cambios</span>
                    </button>
                </div>
            </form>
        </div>
    </div>
</main>
<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
