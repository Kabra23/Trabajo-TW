<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${modoEditar} ? 'Editar usuario' : 'Nuevo usuario'">Usuario - CUMe y Calla</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <style>
        body { background: #f5f7fa; margin: 0; font-family: 'Segoe UI', sans-serif; }
        .page-wrap { max-width: 560px; margin: 2.5rem auto; padding: 0 1.5rem; }
        .card { background: white; border-radius: 14px; padding: 2rem;
                box-shadow: 0 2px 12px rgba(0,0,0,.08); }
        h1 { color: #069c6f; font-size: 1.6rem; margin-top: 0; margin-bottom: 1.8rem; }
        .form-field { margin-bottom: 1.1rem; }
        .form-field label { font-weight: 600; display: block; margin-bottom: .4rem;
            color: #333; font-size: .9rem; }
        .form-field input { width: 100%; padding: .75rem .9rem; border: 2px solid #e0e0e0;
            border-radius: 8px; font-size: .93rem; font-family: inherit;
            transition: border-color .2s; box-sizing: border-box; }
        .form-field input:focus { outline: none; border-color: #069c6f; }
        .form-hint { font-size: .79rem; color: #888; margin-top: .25rem; }
        .checkbox-row { display: flex; align-items: center; gap: .6rem;
            padding: .8rem; background: #f9f9f9; border-radius: 8px;
            border: 2px solid #e0e0e0; margin-bottom: 1.1rem; cursor: pointer; }
        .checkbox-row input[type=checkbox] { width: 18px; height: 18px; cursor: pointer; accent-color: #e65100; }
        .checkbox-row label { font-weight: 600; color: #333; font-size: .92rem; cursor: pointer; margin: 0; }
        .btn-row { display: flex; gap: .8rem; margin-top: 1.6rem; }
        .btn-submit { flex: 1; background: #069c6f; color: white; border: none;
            padding: .8rem; border-radius: 8px; font-weight: 700; cursor: pointer;
            font-family: inherit; font-size: .95rem; }
        .btn-submit:hover { background: #038a63; }
        .btn-cancel { flex: 1; background: #f5f5f5; color: #555; border: 2px solid #e0e0e0;
            padding: .75rem; border-radius: 8px; font-weight: 600; cursor: pointer;
            font-family: inherit; font-size: .93rem; text-decoration: none;
            display: flex; align-items: center; justify-content: center; }
        .btn-cancel:hover { background: #e8e8e8; }
        .msg-err { background: #ffebee; color: #d32f2f; padding: .9rem 1rem;
            border-radius: 8px; border-left: 4px solid #d32f2f; margin-bottom: 1.2rem; font-weight: 600; }
        .divider { border: none; border-top: 2px solid #f0f0f0; margin: 1.5rem 0; }
    </style>
</head>
<body>

<header th:replace="~{fragments/layout :: header}"></header>

<div class="page-wrap">
    <div class="card">
        <h1 th:text="${modoEditar} ? 'Editar usuario' : 'Nuevo usuario'">Usuario</h1>

        <div th:if="${error}" class="msg-err" th:text="${error}"></div>

        <!-- MODO EDITAR -->
        <form th:if="${modoEditar}"
              th:action="@{/usuarios/{id}/editar(id=${usuario.id})}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <div class="form-field">
                <label for="nombre">Nombre *</label>
                <input type="text" id="nombre" name="nombre" th:value="${usuario.nombre}" required>
            </div>
            <div class="form-field">
                <label for="apellidos">Apellidos *</label>
                <input type="text" id="apellidos" name="apellidos" th:value="${usuario.apellidos}" required>
            </div>
            <div class="form-field">
                <label for="email">Email *</label>
                <input type="email" id="email" name="email" th:value="${usuario.email}" required>
                <p class="form-hint">Si cambias el email, el usuario debera iniciar sesion de nuevo.</p>
            </div>
            <hr class="divider">
            <div class="checkbox-row">
                <input type="checkbox" id="esAdmin" name="esAdmin" value="true"
                       th:checked="${usuario.esAdmin()}">
                <label for="esAdmin">Privilegios de administrador</label>
            </div>
            <div class="btn-row">
                <a th:href="@{/usuarios}" class="btn-cancel">Cancelar</a>
                <button type="submit" class="btn-submit">Guardar cambios</button>
            </div>
        </form>

        <!-- MODO CREAR -->
        <form th:unless="${modoEditar}" th:action="@{/usuarios/nuevo}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <div class="form-field">
                <label for="nombre">Nombre *</label>
                <input type="text" id="nombre" name="nombre" required placeholder="Nombre del usuario">
            </div>
            <div class="form-field">
                <label for="apellidos">Apellidos *</label>
                <input type="text" id="apellidos" name="apellidos" required placeholder="Apellidos">
            </div>
            <div class="form-field">
                <label for="email">Email *</label>
                <input type="email" id="email" name="email" required placeholder="correo@ejemplo.com">
            </div>
            <div class="form-field">
                <label for="password">Contrasena *</label>
                <input type="password" id="password" name="password" required
                       placeholder="Min. 8 caracteres">
            </div>
            <hr class="divider">
            <div class="checkbox-row">
                <input type="checkbox" id="esAdmin" name="esAdmin" value="true">
                <label for="esAdmin">Privilegios de administrador</label>
            </div>
            <div class="btn-row">
                <a th:href="@{/usuarios}" class="btn-cancel">Cancelar</a>
                <button type="submit" class="btn-submit">Crear usuario</button>
            </div>
        </form>
    </div>
</div>

</body>
</html>
