<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(${modo == 'crear'} ? 'Nuevo restaurante' : 'Editar restaurante')}">
    <link rel="stylesheet" th:href="@{/css/editar-restaurante.css}">
</head>
<body>
<header th:replace="~{fragments/layout :: header}"></header>

<main class="edit-page">
    <div class="container">
        <div th:replace="~{fragments/layout :: mensajes}"></div>

        <section class="edit-content" style="max-width:900px; margin:2rem auto; background:white; border-radius:12px; padding:2.5rem; box-shadow:0 2px 8px rgba(0,0,0,.05)">
            <h1 th:text="${modo == 'crear'} ? 'Nuevo restaurante' : 'Editar restaurante'">Restaurante</h1>

            <!-- URL dinámica según modo crear/editar -->
            <form th:action="${modo == 'crear'} ? @{/restaurantes/nuevo} : @{/restaurantes/{id}/editar(id=${restaurante.id})}"
                  method="post" th:object="${restaurante}" novalidate enctype="multipart/form-data">

                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                <!-- NOMBRE -->
                <div class="form-group">
                    <label for="nombre">Nombre *</label>
                    <input type="text" id="nombre" th:field="*{nombre}" required>
                    <span class="error-message" th:if="${#fields.hasErrors('nombre')}"
                          th:errors="*{nombre}"></span>
                </div>

                <!-- DIRECCIÓN -->
                <div class="form-group">
                    <label for="direccion">Dirección *</label>
                    <textarea id="direccion" th:field="*{direccion}" rows="3" required></textarea>
                    <span class="error-message" th:if="${#fields.hasErrors('direccion')}"
                          th:errors="*{direccion}"></span>
                </div>

                <!-- LOCALIDAD -->
                <div class="form-group">
                    <label for="localidad">Localidad</label>
                    <input type="text" id="localidad" th:field="*{localidad}"
                           placeholder="Ej: Mérida">
                </div>

                <!-- TELÉFONO y EMAIL -->
                <div class="form-row-2">
                    <div class="form-group">
                        <label for="telefono">Teléfono *</label>
                        <input type="tel" id="telefono" th:field="*{telefono}" required>
                        <span class="error-message" th:if="${#fields.hasErrors('telefono')}"
                              th:errors="*{telefono}"></span>
                    </div>
                    <div class="form-group">
                        <label for="email">Correo de contacto *</label>
                        <input type="email" id="email" th:field="*{email}" required>
                        <span class="error-message" th:if="${#fields.hasErrors('email')}"
                              th:errors="*{email}"></span>
                    </div>
                </div>

                <!-- RANGO DE PRECIO -->
                <div class="form-row-2">
                    <div class="form-group">
                        <label for="precioMin">Precio mínimo (€)</label>
                        <input type="number" id="precioMin" th:field="*{precioMin}"
                               min="0" step="0.5">
                    </div>
                    <div class="form-group">
                        <label for="precioMax">Precio máximo (€)</label>
                        <input type="number" id="precioMax" th:field="*{precioMax}"
                               min="0" step="0.5">
                    </div>
                </div>

                <!-- CATEGORÍAS (checkbox) -->
                <div class="form-group">
                    <label>Categorías</label>
                    <div class="checkbox-group">
                        <label th:each="cat : ${categorias}" class="checkbox-label">
                            <input type="checkbox" name="categoriaIds" th:value="${cat.id}"
                                   th:checked="${restaurante.categorias != null and #lists.contains(restaurante.categorias, cat)}">
                            <span th:text="${cat.nombre}">Categoría</span>
                        </label>
                    </div>
                </div>

                <!-- BIKE FRIENDLY (radio) -->
                <div class="form-group">
                    <label>Bike Friendly</label>
                    <div class="radio-group">
                        <label class="radio-label">
                            <input type="radio" name="bikeFriendly" value="true"
                                   th:checked="${restaurante.bikeFriendly == true}">
                            <span>Sí</span>
                        </label>
                        <label class="radio-label">
                            <input type="radio" name="bikeFriendly" value="false"
                                   th:checked="${restaurante.bikeFriendly != true}">
                            <span>No</span>
                        </label>
                    </div>
                </div>

                <!-- IMAGEN (extra) -->
                <div class="form-group">
                    <label for="imagenFile">Imagen del restaurante (opcional)</label>
                    <input type="file" id="imagenFile" name="imagenFile"
                           accept="image/jpeg,image/png,image/webp">
                    <img th:if="${restaurante.imagen != null}"
                         th:src="@{'/uploads/' + ${restaurante.imagen}}"
                         alt="Imagen actual" style="margin-top:.5rem; max-height:120px; border-radius:8px">
                </div>

                <!-- ACCIONES -->
                <div class="form-actions">
                    <a th:href="${modo == 'crear'} ? @{/restaurantes} : @{/restaurantes/{id}(id=${restaurante.id})}"
                       class="btn-cancel">Cancelar</a>
                    <button type="submit" class="btn-submit"
                            th:text="${modo == 'crear'} ? 'Crear restaurante' : 'Guardar cambios'">
                        Guardar
                    </button>
                </div>
            </form>
        </section>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
