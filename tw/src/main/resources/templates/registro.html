<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - CUMe y Calla</title>
    <link rel="stylesheet" th:href="@{/css/registro.css}">
</head>
<body>
<header class="simple-header">
    <div class="container">
        <a th:href="@{/}" class="back-link">← Volver</a>
        <div class="logo">
            <h1>
                <span class="logo-main">CUMe</span>
                <span class="logo-separator">y</span>
                <span class="logo-secondary">Calla</span>
            </h1>
        </div>
    </div>
</header>

<main class="auth-page">
    <section class="auth-container">
        <div class="auth-card">
            <h2>Crear cuenta</h2>

            <form id="registerForm" th:action="@{/registro}" th:object="${usuario}"
                  method="post" novalidate>
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                <div class="form-group">
                    <label for="nombre">Nombre</label>
                    <input
                        type="text"
                        id="nombre"
                        th:field="*{nombre}"
                        placeholder="Tu nombre"
                        required
                    >
                    <!-- Error del servidor -->
                    <span class="error-message"
                          th:if="${#fields.hasErrors('nombre')}"
                          th:errors="*{nombre}"></span>
                    <!-- Error del cliente -->
                    <span class="error-message" id="nombreError"></span>
                </div>

                <div class="form-group">
                    <label for="apellidos">Apellidos</label>
                    <input
                        type="text"
                        id="apellidos"
                        th:field="*{apellidos}"
                        placeholder="Tus apellidos"
                        required
                    >
                    <span class="error-message"
                          th:if="${#fields.hasErrors('apellidos')}"
                          th:errors="*{apellidos}"></span>
                    <span class="error-message" id="apellidosError"></span>
                </div>

                <div class="form-group">
                    <label for="email">Correo electrónico</label>
                    <input
                        type="email"
                        id="email"
                        th:field="*{email}"
                        placeholder="correo@ejemplo.com"
                        required
                    >
                    <span class="error-message"
                          th:if="${#fields.hasErrors('email')}"
                          th:errors="*{email}"></span>
                    <span class="error-message" id="emailError"></span>
                </div>

                <div class="form-group">
                    <label for="passwordRegistro">Contraseña</label>
                    <div class="password-wrapper">
                        <input
                            type="password"
                            id="passwordRegistro"
                            name="password"
                            placeholder="Crea una contraseña segura"
                            required
                        >
                        <button type="button" class="toggle-password"
                                data-target="passwordRegistro"
                                aria-label="Mostrar contraseña">
                            <span>
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <line x1="1" y1="1" x2="23" y2="23"></line>
                                    <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                                </svg>
                            </span>
                        </button>
                    </div>
                    <span class="password-requirements">
                        Mínimo 8 caracteres, mayúscula, minúscula, número y carácter especial (@$!%*?&)
                    </span>
                    <span class="error-message"
                          th:if="${#fields.hasErrors('password')}"
                          th:errors="*{password}"></span>
                    <span class="error-message" id="passwordRegistroError"></span>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirmar contraseña</label>
                    <div class="password-wrapper">
                        <input
                            type="password"
                            id="confirmPassword"
                            name="confirmPassword"
                            placeholder="Repite tu contraseña"
                            required
                        >
                        <button type="button" class="toggle-password"
                                data-target="confirmPassword"
                                aria-label="Mostrar contraseña">
                            <span>
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <line x1="1" y1="1" x2="23" y2="23"></line>
                                    <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                                </svg>
                            </span>
                        </button>
                    </div>
                    <span class="error-message" id="confirmPasswordError"></span>
                </div>

                <button type="submit" class="btn-submit">Registrarse</button>

                <div class="auth-footer">
                    <p>¿Ya tienes cuenta? <a th:href="@{/login}" class="register-link">Inicia sesión</a></p>
                </div>
            </form>
        </div>
    </section>
</main>

<script th:src="@{/js/registro.js}"></script>
</body>
</html>
