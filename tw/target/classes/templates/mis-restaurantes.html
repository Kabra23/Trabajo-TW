<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis restaurantes - CUMe y Calla</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;0,900;1,400&family=Syne:wght@800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link rel="stylesheet" th:href="@{/css/nav.css}">
    <style>
        /* ── Página mis restaurantes ── */
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }
        .page-header h1 {
            color: #069c6f;
            font-size: 1.8rem;
        }

        .btn-new {
            background: #069c6f;
            color: white;
            padding: 0.6rem 1.4rem;
            border-radius: 20px;
            text-decoration: none;
            font-weight: 700;
            font-size: 0.92rem;
            font-family: 'DM Sans', sans-serif;
            transition: background 0.2s;
            display: inline-block;
        }
        .btn-new:hover { background: #038a63; color: white; }

        /* Tarjeta de restaurante */
        .restaurant-card-admin {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 12px rgba(0,0,0,.07);
            margin-bottom: 1.2rem;
            display: flex;
        }
        .card-banner {
            width: 180px;
            height: 140px;
            flex-shrink: 0;
            background: #e8f5f1;
            position: relative;
            overflow: hidden;
        }
        .card-banner-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .estado-badge {
            position: absolute;
            top: .6rem;
            left: .6rem;
            font-size: .75rem;
            padding: .25rem .65rem;
            border-radius: 20px;
            font-weight: 700;
        }
        .abierto { background: #e8f5f1; color: #069c6f; }
        .cerrado { background: #ffebee; color: #d32f2f; }

        .card-info {
            flex: 1;
            padding: 1.2rem 1.5rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .card-info h2 { font-size: 1.2rem; color: #2d3436; margin-bottom: .3rem; }
        .card-info .meta { color: #888; font-size: .9rem; margin-bottom: .8rem; }

        .card-actions { display: flex; gap: .6rem; flex-wrap: wrap; }

        .btn-sm {
            padding: .4rem 1rem;
            border-radius: 20px;
            font-size: .85rem;
            font-weight: 600;
            font-family: 'DM Sans', sans-serif;
            text-decoration: none;
            border: none;
            cursor: pointer;
            transition: all .2s;
            display: inline-block;
        }
        .btn-edit-sm    { background: #e8f5f1; color: #069c6f; border: 2px solid #069c6f; }
        .btn-edit-sm:hover    { background: #069c6f; color: white; }
        .btn-view-sm    { background: #f0f0f0; color: #555; border: 2px solid #e0e0e0; }
        .btn-view-sm:hover    { background: #069c6f; color: white; border-color: #069c6f; }
        .btn-pedidos-sm { background: #e3f2fd; color: #1565c0; border: 2px solid #1565c0; }
        .btn-pedidos-sm:hover { background: #1565c0; color: white; }
        .btn-delete-sm  { background: #ffebee; color: #d32f2f; border: 2px solid #d32f2f; }
        .btn-delete-sm:hover  { background: #d32f2f; color: white; }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,.05);
        }
        .empty-state h2 { color: #069c6f; margin-bottom: .5rem; }
        .empty-state p  { color: #888; margin-bottom: 1.5rem; }

        .msg-ok  { background: #e8f5f1; color: #069c6f; padding: 1rem; border-radius: 8px; border-left: 4px solid #069c6f; margin-bottom: 1rem; }
        .msg-err { background: #ffebee; color: #d32f2f; padding: 1rem; border-radius: 8px; border-left: 4px solid #d32f2f; margin-bottom: 1rem; }

        main { background: #F8F9FA; min-height: calc(100vh - 60px); }
    </style>
</head>
<body>
<header th:replace="~{fragments/layout :: header}"></header>

<main>
    <div class="container" style="padding-top:2rem; padding-bottom:2rem;">
        <div class="page-header">
            <h1>Mis restaurantes</h1>
            <a th:href="@{/restaurantes/nuevo}" class="btn-new">+ Nuevo restaurante</a>
        </div>

        <!-- Mensajes flash -->
        <div th:if="${exito}" class="msg-ok" th:text="${exito}"></div>
        <div th:if="${error}" class="msg-err" th:text="${error}"></div>

        <!-- Sin restaurantes -->
        <div th:if="${restaurantes == null or #lists.isEmpty(restaurantes)}" class="empty-state">
            <h2>Aun no tienes restaurantes</h2>
            <p>Crea tu primer restaurante y empieza a recibir pedidos.</p>
            <a th:href="@{/restaurantes/nuevo}" class="btn-new">Crear mi primer restaurante</a>
        </div>

        <!-- Lista de restaurantes del usuario -->
        <div th:each="r : ${restaurantes}" class="restaurant-card-admin">
            <!-- Banner / imagen -->
            <div class="card-banner">
                <img th:src="@{${@vistaImagenService.restaurante(r)}}"
                     th:alt="${r.nombre}"
                     class="card-banner-img">
                <span th:if="${r.aceptaPedidos}"   class="estado-badge abierto">Abierto</span>
                <span th:unless="${r.aceptaPedidos}" class="estado-badge cerrado">Cerrado</span>
            </div>

            <!-- Info -->
            <div class="card-info">
                <div>
                    <h2 th:text="${r.nombre}">Nombre</h2>
                    <p class="meta">
                        <span th:if="${r.localidad != null and !#strings.isEmpty(r.localidad)}" th:text="${r.localidad}"></span>
                        <span th:if="${r.categorias != null and !#lists.isEmpty(r.categorias)}">
                            &nbsp;·&nbsp;
                            <span th:text="${#strings.replace(r.categorias.![nombre].toString(),'[','').replace(']','')}"></span>
                        </span>
                        <span th:if="${r.precioMin != null}">
                            &nbsp;·&nbsp;
                            <span th:text="${#numbers.formatDecimal(r.precioMin,1,2)} + '–' + ${#numbers.formatDecimal(r.precioMax,1,2)} + '€'"></span>
                        </span>
                    </p>
                </div>
                <div class="card-actions">
                    <a th:href="@{/restaurantes/{id}(id=${r.id})}" class="btn-sm btn-view-sm">Ver</a>
                    <a th:href="@{/restaurantes/{id}/editar(id=${r.id})}" class="btn-sm btn-edit-sm">Editar</a>
                    <a th:href="@{/pedidos/restaurante/{id}(id=${r.id})}" class="btn-sm btn-pedidos-sm">Pedidos</a>
                    <!-- Toggle estado -->
                    <form th:action="@{/restaurantes/{id}/estado(id=${r.id})}" method="post" style="display:inline">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <input type="hidden" name="aceptaPedidos" th:value="${!r.aceptaPedidos}">
                        <button type="submit" class="btn-sm"
                                th:style="${r.aceptaPedidos} ? 'background:#fff3e0;color:#e65100;border:2px solid #e65100' : 'background:#e8f5f1;color:#069c6f;border:2px solid #069c6f'"
                                th:text="${r.aceptaPedidos} ? 'Pausar' : 'Activar'">Estado</button>
                    </form>
                    <!-- Eliminar -->
                    <form th:action="@{/restaurantes/{id}/eliminar(id=${r.id})}" method="post" style="display:inline"
                          onsubmit="return confirm('Eliminar este restaurante?')">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <input type="hidden" name="redirectTo" value="/mis-restaurantes">
                        <button type="submit" class="btn-sm btn-delete-sm">Eliminar</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
