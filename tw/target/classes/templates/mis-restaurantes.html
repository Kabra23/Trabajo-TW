<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis restaurantes - CUMe y Calla</title>
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:'Segoe UI',sans-serif;background:#f5f5f5;color:#333}
        .main-header{background:#069c6f;padding:1rem 2rem;display:flex;align-items:center;justify-content:space-between}
        .logo h1{color:white;font-size:1.5rem;margin:0}
        .logo-separator{opacity:.7;margin:0 .3rem}
        nav ul{list-style:none;display:flex;gap:.8rem;align-items:center}
        nav a{color:white;text-decoration:none;font-weight:500;padding:.4rem .6rem;border-radius:6px;transition:background .2s}
        nav a:hover{background:rgba(255,255,255,.15)}
        .btn-logout{background:transparent;color:#fff;border:2px solid rgba(255,255,255,.75);padding:.4rem 1rem;border-radius:25px;cursor:pointer;font-family:inherit;font-size:.9rem;font-weight:600}
        .container{max-width:960px;margin:0 auto;padding:2rem 1.5rem}
        .page-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:2rem}
        .page-header h1{color:#069c6f;font-size:1.8rem}
        .btn-new{background:#069c6f;color:white;padding:.7rem 1.5rem;border-radius:25px;text-decoration:none;font-weight:700;font-size:1rem;transition:background .2s}
        .btn-new:hover{background:#038a63}
        /* Tarjeta de restaurante */
        .restaurant-card-admin{background:white;border-radius:12px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.07);margin-bottom:1.2rem;display:flex;gap:0}
        .card-banner{width:180px;min-height:130px;flex-shrink:0;background:#e8f5f1;position:relative;overflow:hidden}
        .card-banner img{width:100%;height:100%;object-fit:cover}
        .card-banner-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:3rem}
        .estado-badge{position:absolute;top:.6rem;left:.6rem;font-size:.75rem;padding:.25rem .6rem;border-radius:12px;font-weight:700}
        .abierto{background:#e8f5f1;color:#069c6f}
        .cerrado{background:#ffebee;color:#d32f2f}
        .card-info{flex:1;padding:1.2rem 1.5rem;display:flex;flex-direction:column;justify-content:space-between}
        .card-info h2{font-size:1.2rem;color:#333;margin-bottom:.3rem}
        .card-info .meta{color:#888;font-size:.9rem;margin-bottom:.8rem}
        .card-actions{display:flex;gap:.6rem;flex-wrap:wrap}
        .btn-sm{padding:.4rem 1rem;border-radius:20px;font-size:.85rem;font-weight:600;text-decoration:none;border:none;cursor:pointer;transition:all .2s}
        .btn-edit-sm{background:#e8f5f1;color:#069c6f;border:2px solid #069c6f}
        .btn-edit-sm:hover{background:#069c6f;color:white}
        .btn-view-sm{background:#f0f0f0;color:#555;border:2px solid #e0e0e0}
        .btn-view-sm:hover{background:#069c6f;color:white;border-color:#069c6f}
        .btn-pedidos-sm{background:#e3f2fd;color:#1565c0;border:2px solid #1565c0}
        .btn-pedidos-sm:hover{background:#1565c0;color:white}
        .btn-delete-sm{background:#ffebee;color:#d32f2f;border:2px solid #d32f2f}
        .btn-delete-sm:hover{background:#d32f2f;color:white}
        .empty-state{text-align:center;padding:4rem 2rem;background:white;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.05)}
        .empty-state h2{color:#069c6f;margin-bottom:.5rem}
        .empty-state p{color:#888;margin-bottom:1.5rem}
        .msg-ok{background:#e8f5f1;color:#069c6f;padding:1rem;border-radius:8px;border-left:4px solid #069c6f;margin-bottom:1rem}
        .msg-err{background:#ffebee;color:#d32f2f;padding:1rem;border-radius:8px;border-left:4px solid #d32f2f;margin-bottom:1rem}
    </style>
</head>
<body>
<header class="main-header">
    <div class="logo">
        <h1><span>CUMe</span><span class="logo-separator">y</span><span>Calla</span></h1>
    </div>
    <nav>
        <ul>
            <li><a th:href="@{/}">Inicio</a></li>
            <li><a th:href="@{/restaurantes}">Restaurantes</a></li>
            <li><a th:href="@{/pedidos/mis-pedidos}">Mis pedidos</a></li>
            <li><a th:href="@{/perfil}"><span sec:authentication="name">Mi perfil</span></a></li>
            <li>
                <form th:action="@{/logout}" method="post" style="display:inline">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button type="submit" class="btn-logout">Cerrar sesion</button>
                </form>
            </li>
        </ul>
    </nav>
</header>

<div class="container">
    <div class="page-header">
        <h1>Mis restaurantes</h1>
        <a th:href="@{/restaurantes/nuevo}" class="btn-new">+ Nuevo restaurante</a>
    </div>

    <!-- Mensajes flash -->
    <div th:if="${exito}" class="msg-ok" th:text="${exito}"></div>
    <div th:if="${error}" class="msg-err" th:text="${error}"></div>

    <!-- Sin restaurantes -->
    <div th:if="${restaurantes == null or #lists.isEmpty(restaurantes)}" class="empty-state">
        <h2>Aun no tienes restaurantes</h2>
        <p>Crea tu primer restaurante y empieza a recibir pedidos.</p>
        <a th:href="@{/restaurantes/nuevo}" class="btn-new">Crear mi primer restaurante</a>
    </div>

    <!-- Lista de restaurantes del usuario -->
    <div th:each="r : ${restaurantes}" class="restaurant-card-admin">
        <!-- Banner / imagen -->
        <div class="card-banner">
            <img th:if="${r.imagenBanner != null}" th:src="@{'/uploads/' + ${r.imagenBanner}}" th:alt="${r.nombre}">
            <img th:if="${r.imagenBanner == null and r.imagen != null}" th:src="@{'/uploads/' + ${r.imagen}}" th:alt="${r.nombre}">
            <div th:if="${r.imagenBanner == null and r.imagen == null}" class="card-banner-placeholder">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="#069c6f" opacity=".4">
                    <path d="M18.06 22.99h1.66c.84 0 1.53-.64 1.63-1.46L23 5.05h-5V1h-1.97v4.05h-4.97l.3 2.34c1.71.47 3.31 1.32 4.27 2.26 1.44 1.42 2.43 2.89 2.43 5.29v8.05zM1 21.99V21h15.03v.99c0 .55-.45 1-1.01 1H2.01c-.56 0-1.01-.45-1.01-1zm15.03-7c0-8.63-15.03-8.63-15.03 0h15.03zM1.02 17h15v2h-15z"/>
                </svg>
            </div>
            <span th:if="${r.aceptaPedidos}" class="estado-badge abierto">Abierto</span>
            <span th:unless="${r.aceptaPedidos}" class="estado-badge cerrado">Cerrado</span>
        </div>

        <!-- Info -->
        <div class="card-info">
            <div>
                <h2 th:text="${r.nombre}">Nombre</h2>
                <p class="meta">
                    <span th:if="${r.localidad != null and !#strings.isEmpty(r.localidad)}" th:text="${r.localidad}"></span>
                    <span th:if="${r.categorias != null and !#lists.isEmpty(r.categorias)}">
                        &nbsp;·&nbsp;
                        <span th:text="${#strings.replace(r.categorias.![nombre].toString(),'[','').replace(']','')}"></span>
                    </span>
                    <span th:if="${r.precioMin != null}">
                        &nbsp;·&nbsp; <span th:text="${#numbers.formatDecimal(r.precioMin,1,2)} + '-' + ${#numbers.formatDecimal(r.precioMax,1,2)} + '€'"></span>
                    </span>
                </p>
            </div>
            <div class="card-actions">
                <a th:href="@{/restaurantes/{id}(id=${r.id})}" class="btn-sm btn-view-sm">Ver</a>
                <a th:href="@{/restaurantes/{id}/editar(id=${r.id})}" class="btn-sm btn-edit-sm">Editar</a>
                <a th:href="@{/pedidos/restaurante/{id}(id=${r.id})}" class="btn-sm btn-pedidos-sm">Pedidos</a>
                <!-- Toggle estado -->
                <form th:action="@{/restaurantes/{id}/estado(id=${r.id})}" method="post" style="display:inline">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <input type="hidden" name="aceptaPedidos" th:value="${!r.aceptaPedidos}">
                    <button type="submit" class="btn-sm"
                            th:style="${r.aceptaPedidos} ? 'background:#fff3e0;color:#e65100;border:2px solid #e65100' : 'background:#e8f5f1;color:#069c6f;border:2px solid #069c6f'"
                            th:text="${r.aceptaPedidos} ? 'Pausar' : 'Activar'">Estado</button>
                </form>
                <!-- Eliminar -->
                <form th:action="@{/restaurantes/{id}/eliminar(id=${r.id})}" method="post" style="display:inline"
                      onsubmit="return confirm('Eliminar este restaurante?')">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button type="submit" class="btn-sm btn-delete-sm">Eliminar</button>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
