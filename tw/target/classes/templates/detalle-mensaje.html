<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mensaje - CUMe y Calla</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <style>
        body { background:#f5f7fa;font-family:'Segoe UI',sans-serif;margin:0; }
        .main-header { background:#069c6f; }
        .main-header .logo-main,.main-header nav a,.main-header .logo-separator,.main-header .logo-secondary { color:white; }
        .btn-logout { background:transparent;color:#fff;border:2px solid rgba(255,255,255,.75);padding:.45rem 1.1rem;border-radius:25px;cursor:pointer;font-family:inherit;font-size:.95rem;font-weight:600; }

        .page-wrap { max-width:720px;margin:2rem auto;padding:0 1.5rem; }
        .back-link { color:#069c6f;text-decoration:none;font-weight:600;font-size:.9rem;display:inline-flex;align-items:center;gap:.3rem;margin-bottom:1.2rem; }
        .back-link:hover { text-decoration:underline; }

        .msg-card { background:white;border-radius:14px;box-shadow:0 2px 12px rgba(0,0,0,.07);overflow:hidden; }
        .msg-header { padding:1.8rem 2rem;border-bottom:1px solid #f0f0f0;background:#fafffe; }
        .msg-header h1 { font-size:1.4rem;color:#333;margin:0 0 1rem; }
        .msg-meta-row { display:flex;gap:2rem;flex-wrap:wrap; }
        .msg-meta-item label { font-size:.78rem;color:#aaa;text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:.15rem;font-weight:600; }
        .msg-meta-item span { font-size:.93rem;color:#333;font-weight:600; }
        .msg-body-text { padding:2rem;color:#444;line-height:1.8;font-size:.97rem;white-space:pre-wrap;word-break:break-word; }

        .msg-actions { padding:1.2rem 2rem;border-top:1px solid #f0f0f0;display:flex;gap:.8rem;flex-wrap:wrap; }
        .btn-reply { background:#069c6f;color:white;border:none;padding:.7rem 1.5rem;border-radius:8px;font-weight:700;cursor:pointer;text-decoration:none;display:inline-block;font-family:inherit;font-size:.93rem;transition:background .2s; }
        .btn-reply:hover { background:#038a63; }
        .btn-del { background:#ffebee;color:#d32f2f;border:2px solid #d32f2f;padding:.6rem 1.2rem;border-radius:8px;font-weight:600;cursor:pointer;font-family:inherit;font-size:.93rem;transition:all .2s; }
        .btn-del:hover { background:#d32f2f;color:white; }
        .btn-back-alt { background:#f5f5f5;color:#555;border:2px solid #e0e0e0;padding:.6rem 1.2rem;border-radius:8px;font-weight:600;text-decoration:none;font-size:.93rem;transition:all .2s; }
        .btn-back-alt:hover { border-color:#999;color:#333; }
    </style>
</head>
<body>
<header class="main-header">
    <div class="container">
        <div class="logo">
            <a th:href="@{/}" style="text-decoration:none">
                <h1><span class="logo-main">CUMe</span><span class="logo-separator">y</span><span class="logo-secondary">Calla</span></h1>
            </a>
        </div>
        <nav class="main-nav">
            <ul>
                <li><a th:href="@{/restaurantes}">Restaurantes</a></li>
                <li><a th:href="@{/mensajes}">Mensajes</a></li>
                <li><a th:href="@{/perfil}"><span sec:authentication="name">Mi perfil</span></a></li>
                <li>
                    <form th:action="@{/logout}" method="post" style="display:inline">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <button type="submit" class="btn-logout">Cerrar sesion</button>
                    </form>
                </li>
            </ul>
        </nav>
    </div>
</header>

<main class="page-wrap">
    <a th:href="@{/mensajes}" class="back-link">
        &#8592; Volver a mensajes
    </a>

    <div class="msg-card">
        <div class="msg-header">
            <h1 th:text="${mensaje.asunto}">Asunto</h1>
            <div class="msg-meta-row">
                <div class="msg-meta-item">
                    <label>De</label>
                    <span th:text="${mensaje.remitente.nombre} + ' ' + ${mensaje.remitente.apellidos}">Remitente</span>
                </div>
                <div class="msg-meta-item">
                    <label>Para</label>
                    <span th:text="${mensaje.destinatario.nombre} + ' ' + ${mensaje.destinatario.apellidos}">Destinatario</span>
                </div>
                <div class="msg-meta-item">
                    <label>Fecha</label>
                    <span th:text="${#temporals.format(mensaje.fecha, 'dd/MM/yyyy HH:mm')}">Fecha</span>
                </div>
                <div class="msg-meta-item" th:if="${esDestinatario}">
                    <label>Estado</label>
                    <span style="color:#069c6f;" th:text="${mensaje.leido} ? 'Leido' : 'Nuevo'">Leido</span>
                </div>
            </div>
        </div>
        <div class="msg-body-text" th:text="${mensaje.contenido}">Contenido del mensaje</div>
        <div class="msg-actions">
            <!-- Responder: rellena el destinatario con el remitente original -->
            <a th:href="@{/mensajes/nuevo(para=${mensaje.remitente.email})}"
               th:if="${esDestinatario}"
               class="btn-reply">Responder</a>
            <form th:action="@{/mensajes/{id}/eliminar(id=${mensaje.id})}" method="post" style="display:inline">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <input type="hidden" name="tab" th:value="${esDestinatario} ? 'entrada' : 'enviados'">
                <button type="submit" class="btn-del"
                        onclick="return confirm('Eliminar este mensaje?')">Eliminar</button>
            </form>
            <a th:href="@{/mensajes}" class="btn-back-alt">Volver</a>
        </div>
    </div>
</main>
</body>
</html>
