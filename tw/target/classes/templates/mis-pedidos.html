<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Mis pedidos')}" th:with="extraCss=~{::link}">
    <link rel="stylesheet" th:href="@{/css/base.css}">
</head>
<body>
<header th:replace="~{fragments/layout :: header}"></header>

<main>
    <div class="container">
        <h1 class="page-title">Mis pedidos</h1>

        <div th:replace="~{fragments/layout :: mensajes}"></div>

        <div th:if="${#lists.isEmpty(pedidos)}" class="empty-state">
            <p>Aún no has realizado ningún pedido.</p>
            <a th:href="@{/restaurantes}" class="btn-primary">
                Explorar restaurantes
            </a>
        </div>

        <div th:each="pedido : ${pedidos}" class="pedido-card">

            <div class="pedido-card-header">
                <div class="pedido-card-title">
                    <img th:if="${pedido.restaurante.imagen != null}"
                         th:src="@{'/uploads/' + ${pedido.restaurante.imagen}}" alt="Restaurante"
                         class="pedido-restaurant-thumb">
                    <img th:unless="${pedido.restaurante.imagen != null}"
                         th:src="@{/img/logo.png}" alt="Restaurante"
                         class="pedido-restaurant-thumb">
                    <div>
                        <h3 th:text="${pedido.restaurante.nombre}">Restaurante</h3>
                        <small th:text="${#temporals.format(pedido.fecha, 'dd/MM/yyyy HH:mm')}">Fecha</small>
                    </div>
                </div>
                <div class="pedido-card-summary">
                    <div class="pedido-total" th:text="${#numbers.formatDecimal(pedido.total,1,2)} + ' €'">0 €</div>
                    <span class="pedido-estado"
                          th:classappend="${#strings.containsIgnoreCase(pedido.estado,'pend')} ? ' pendiente' : ''
                           + (${#strings.containsIgnoreCase(pedido.estado,'prepar')} ? ' preparacion' : '')
                           + (${#strings.containsIgnoreCase(pedido.estado,'envi')} ? ' enviado' : '')
                           + (${#strings.containsIgnoreCase(pedido.estado,'entr')} ? ' entregado' : '')
                           + (${#strings.containsIgnoreCase(pedido.estado,'cancel')} ? ' cancelado' : '')"
                          th:text="${pedido.estado}">Estado</span>
                </div>
            </div>

            <table class="table lineas-pedido">
                <thead>
                <tr>
                    <th>Plato</th>
                    <th class="text-center">Cant.</th>
                    <th class="text-right">Precio</th>
                    <th class="text-right">Subtotal</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="linea : ${pedido.lineas}">
                    <td th:text="${linea.nombrePlato}">Plato</td>
                    <td class="text-center" th:text="${linea.cantidad}">1</td>
                    <td class="text-right" th:text="${#numbers.formatDecimal(linea.precio,1,2)} + ' €'">0 €</td>
                    <td class="text-right font-weight-bold" th:text="${#numbers.formatDecimal(linea.precio * linea.cantidad,1,2)} + ' €'">0 €</td>
                </tr>
                </tbody>
            </table>

            <div class="pedido-card-actions">
                <a th:href="@{/restaurantes/{id}(id=${pedido.restaurante.id})}" class="btn-secondary">Ver restaurante</a>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
