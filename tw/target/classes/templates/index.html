<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Inicio')}">
    <link rel="stylesheet" th:href="@{/css/index.css}">
</head>
<body>
<header th:replace="~{fragments/layout :: header}"></header>

<main>
    <section class="hero">
        <div class="hero-content">
            <div class="hero-text">
                <h2>Pide comida y mucho más</h2>
                <p class="subtitle">Restaurantes cerca de ti en Mérida</p>

                <form class="search-form" th:action="@{/restaurantes}" method="get">
                    <div class="search-box">
                        <label for="address" class="sr-only">Buscar restaurante o localidad</label>
                        <input type="text" id="address" name="q"
                               placeholder="Busca un restaurante o localidad..."
                               autocomplete="off">
                        <button type="submit" class="btn-search">Buscar</button>
                    </div>
                </form>
            </div>

            <div class="hero-image">
                <div class="hero-banner">
                    <h3>¿Lo quieres? Lo tienes</h3>
                    <div class="banner-icon">🍽️</div>
                    <div class="banner-logo">CUMe y Calla</div>
                </div>
            </div>
        </div>
    </section>

    <!-- Categorías desde BD (extra: acceso rápido) -->
    <section class="categories-section">
        <div class="container">
            <h2>Categorías populares</h2>
            <p class="section-subtitle">Explora los tipos de cocina disponibles en Mérida.</p>

            <div class="categories-grid">
                <th:block th:if="${#lists.isEmpty(categorias)}">
                    <p style="color:#888">Aún no hay categorías disponibles.</p>
                </th:block>

                <a th:each="cat : ${categorias}"
                   th:href="@{/restaurantes(categoria=${cat.id})}"
                   class="category-card" style="text-decoration:none">
                    <div class="category-image">
                        <img th:if="${cat.imagen != null}"
                             th:src="@{'/uploads/' + ${cat.imagen}}"
                             th:alt="${cat.nombre}">
                        <span th:unless="${cat.imagen != null}" class="category-icon">🍴</span>
                    </div>
                    <h3 th:text="${cat.nombre}">Categoría</h3>
                </a>
            </div>
        </div>
    </section>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<script th:src="@{/js/search.js}"></script>
</body>
</html>
