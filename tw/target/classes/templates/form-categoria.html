<!-- ============================================================
     form-categoria.html
     ============================================================ -->
<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Categoría')}">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<header th:replace="~{fragments/layout :: header}"></header>
<main style="min-height:70vh; background:#f5f5f5; padding:2rem 0">
    <div class="container" style="max-width:600px">
        <h1 style="color:#069c6f; margin-bottom:1.5rem"
            th:text="${modo == 'crear'} ? 'Nueva categoría' : 'Editar categoría'">Categoría</h1>

        <div style="background:white; border-radius:12px; padding:2rem; box-shadow:0 2px 8px rgba(0,0,0,.05)">
            <form th:action="${modo == 'crear'} ? @{/categorias/nueva} : @{/categorias/{id}/editar(id=${categoria.id})}"
                  method="post" enctype="multipart/form-data">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                <div class="form-group" style="margin-bottom:1rem">
                    <label style="font-weight:600; display:block; margin-bottom:.4rem">Nombre *</label>
                    <input type="text" name="nombre" th:value="${categoria.nombre}" required
                           style="width:100%; padding:.8rem; border:2px solid #e0e0e0; border-radius:8px">
                </div>

                <div class="form-group" style="margin-bottom:1rem">
                    <label style="font-weight:600; display:block; margin-bottom:.4rem">Descripción</label>
                    <textarea name="descripcion" rows="3"
                              style="width:100%; padding:.8rem; border:2px solid #e0e0e0; border-radius:8px"
                              th:text="${categoria.descripcion}"></textarea>
                </div>

                <div class="form-group" style="margin-bottom:1.5rem">
                    <label style="font-weight:600; display:block; margin-bottom:.4rem">Imagen</label>
                    <input type="file" name="imagenFile" accept="image/jpeg,image/png,image/webp">
                    <img th:if="${categoria.imagen != null}"
                         th:src="@{'/uploads/' + ${categoria.imagen}}"
                         style="margin-top:.5rem; max-height:80px; border-radius:8px">
                </div>

                <div style="display:flex; gap:1rem; justify-content:flex-end">
                    <a th:href="@{/categorias}" class="btn-cancel"
                       style="padding:.8rem 1.5rem; border:2px solid #e0e0e0; border-radius:8px; text-decoration:none; color:#666">
                        Cancelar
                    </a>
                    <button type="submit" class="btn-primary">
                        <span th:text="${modo == 'crear'} ? 'Crear' : 'Guardar'">Guardar</span>
                    </button>
                </div>
            </form>
        </div>
    </div>
</main>
<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
