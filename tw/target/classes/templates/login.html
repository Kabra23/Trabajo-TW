<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión - CUMe y Calla</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;0,900;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/login.css}">
</head>
<body>
<header class="simple-header">
    <div class="container">
        <a th:href="@{/}" class="back-link">← Volver</a>
        <div class="logo">
            <h1>
                <span class="logo-main">CUMe</span>
                <span class="logo-separator">y</span>
                <span class="logo-secondary">Calla</span>
            </h1>
        </div>
    </div>
</header>

<main class="auth-page">
    <section class="auth-container">
        <div class="auth-card">
            <h2>Iniciar sesión</h2>

            <!-- Mensaje error Spring Security (?error=true) -->
            <div th:if="${param.error}"
                 style="background:#ffebee;color:#d32f2f;padding:1rem;border-radius:8px;margin-bottom:1.5rem;text-align:center;font-weight:600;border-left:4px solid #d32f2f;">
                Email o contraseña incorrectos. Inténtalo de nuevo.
            </div>
            <!-- Mensaje éxito tras registro -->
            <div th:if="${exito}"
                 style="background:#e8f5f1;color:#069c6f;padding:1rem;border-radius:8px;margin-bottom:1.5rem;text-align:center;font-weight:600;border-left:4px solid #069c6f;"
                 th:text="${exito}"></div>

            <!-- CRÍTICO: action=/login y name=username es lo que espera Spring Security -->
            <form id="loginForm" th:action="@{/login}" method="post" novalidate>
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                <div class="form-group">
                    <label for="username">Correo electrónico</label>
                    <input type="email" id="username" name="username"
                           placeholder="Correo electrónico" autocomplete="email" required>
                    <span class="error-message" id="emailError"></span>
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" name="password"
                               placeholder="Contraseña" autocomplete="current-password" required>
                        <button type="button" class="toggle-password" aria-label="Mostrar contraseña">
                            <span><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="1" y1="1" x2="23" y2="23"></line><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path></svg></span>
                        </button>
                    </div>
                    <span class="error-message" id="passwordError"></span>
                </div>

                <button type="submit" class="btn-submit">Iniciar sesion</button>

                <div class="auth-footer">
                    <p>No tienes cuenta? <a th:href="@{/registro}" class="register-link">Registrate</a></p>
                </div>
            </form>
        </div>
    </section>
</main>

<script th:src="@{/js/login.js}"></script>
</body>
</html>
