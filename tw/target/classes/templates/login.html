<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión - Just Eat CUMe</title>
    <link rel="stylesheet" href="../static/css/login.css">
</head>
<body>
<header class="simple-header">
    <div class="container">
        <a href="index.html" class="back-link">← Volver</a>
        <div class="logo">
            <h1>
                <span class="logo-main">CUMe</span>
                <span class="logo-separator">y</span>
                <span class="logo-secondary">Calla</span>
            </h1>
        </div>
    </div>
</header>

<main class="auth-page">
    <section class="auth-container">
        <div class="auth-card">
            <h2>Iniciar sesión</h2>

            <form id="loginForm" novalidate>
                <div class="form-group">
                    <label for="email">Correo electrónico</label>
                    <input
                            type="email"
                            id="email"
                            name="email"
                            placeholder="Correo electrónico"
                            required
                    >
                    <span class="error-message" id="emailError"></span>
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <div class="password-wrapper">
                        <input
                                type="password"
                                id="password"
                                name="password"
                                placeholder="Contraseña"
                                required
                        >
                        <button type="button" class="toggle-password" aria-label="Mostrar contraseña">
                            <span><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="1" y1="1" x2="23" y2="23"></line><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path></svg></span>
                        </button>
                    </div>
                    <span class="error-message" id="passwordError"></span>
                </div>

                <button type="submit" class="btn-submit">Iniciar sesión</button>

                <div class="auth-links">
                    <a href="#" class="forgot-password">¿Olvidaste tu contraseña?</a>
                </div>

                <div class="auth-footer">
                    <p>¿No tienes cuenta? <a href="registro.html" class="register-link">Regístrate</a></p>
                </div>
            </form>
        </div>
    </section>
</main>

<script src="../static/js/login.js"></script>
</body>
</html>
