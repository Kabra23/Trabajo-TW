<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:fragment="head(titulo)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${titulo} + ' - CUMe y Calla'">CUMe y Calla</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link rel="stylesheet" th:href="@{/css/nav.css}">
</head>

<header th:fragment="header" class="main-header">
    <div class="container">
        <div class="logo">
            <a th:href="@{/}" style="text-decoration:none">
                <h1>
                    <span class="logo-main">CUMe</span>
                    <span class="logo-separator">y</span>
                    <span class="logo-secondary">Calla</span>
                </h1>
            </a>
        </div>
        <nav class="main-nav">
            <ul>
                <li><a th:href="@{/restaurantes}">Restaurantes</a></li>
                <li sec:authorize="isAuthenticated()">
                    <a th:href="@{/restaurantes/nuevo}" class="btn-secondary">+ Mi restaurante</a>
                </li>
                <li sec:authorize="isAuthenticated()">
                    <a th:href="@{/pedidos/mis-pedidos}">Mis pedidos</a>
                </li>
                <li class="nav-dropdown" sec:authorize="hasRole('ROLE_ADMIN')">
                    <button class="nav-dropdown-btn" type="button">
                        &#9881; Admin <span class="dropdown-arrow">&#9660;</span>
                    </button>
                    <ul class="nav-dropdown-menu">
                        <li><a th:href="@{/categorias}">Categorias</a></li>
                        <li><a th:href="@{/usuarios}">Usuarios</a></li>
                    </ul>
                </li>
                <li sec:authorize="isAuthenticated()">
                    <a th:href="@{/perfil}">
                        <span sec:authentication="name">Usuario</span>
                    </a>
                </li>
                <li sec:authorize="isAuthenticated()">
                    <form th:action="@{/logout}" method="post" style="display:inline">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <button type="submit" class="btn-logout">Cerrar sesion</button>
                    </form>
                </li>
                <li sec:authorize="!isAuthenticated()">
                    <a th:href="@{/login}" class="btn-secondary">Inicia sesion</a>
                </li>
                <li sec:authorize="!isAuthenticated()">
                    <a th:href="@{/registro}" class="btn-primary">Registrate</a>
                </li>
            </ul>
        </nav>
    </div>
    <script>
    (function () {
        function initDropdown() {
            var btn  = document.querySelector('.nav-dropdown-btn');
            var menu = document.querySelector('.nav-dropdown-menu');
            if (!btn || !menu) return;
            btn.addEventListener('click', function (e) {
                e.stopPropagation();
                var open = menu.classList.toggle('open');
                btn.classList.toggle('open', open);
            });
            document.addEventListener('click', function () {
                menu.classList.remove('open');
                btn.classList.remove('open');
            });
            menu.addEventListener('click', function (e) { e.stopPropagation(); });
        }
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initDropdown);
        } else {
            initDropdown();
        }
    })();
    </script>
</header>

<div th:fragment="mensajes">
    <div th:if="${exito}" class="alert alert-success" th:text="${exito}"></div>
    <div th:if="${error}"  class="alert alert-error"   th:text="${error}"></div>
</div>

<footer th:fragment="footer" class="main-footer">
    <div class="container">
        <p>2025 CUMe y Calla - Proyecto Tecnologias Web UEx</p>
    </div>
</footer>

</html>
