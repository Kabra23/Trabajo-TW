<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Categorias - CUMe y Calla</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <style>
        body { background: #f5f7fa; margin: 0; font-family: 'Segoe UI', sans-serif; }
        .page-wrap { max-width: 900px; margin: 2rem auto; padding: 0 1.5rem;
            display: grid; grid-template-columns: 1fr 340px; gap: 2rem; }
        @media(max-width:700px){ .page-wrap { grid-template-columns: 1fr; } }
        .card { background: white; border-radius: 14px; padding: 1.8rem;
            box-shadow: 0 2px 10px rgba(0,0,0,.07); }
        .page-title { color: #069c6f; font-size: 1.8rem; margin: 2rem auto .3rem;
            max-width: 900px; padding: 0 1.5rem; }
        h2 { color: #333; font-size: 1.2rem; margin-top: 0; margin-bottom: 1.2rem; }
        .msg-ok  { background: #e8f5f1; color: #069c6f; padding: 1rem; border-radius: 8px;
            border-left: 4px solid #069c6f; margin: 0 auto 1.2rem;
            max-width: 900px; padding-left: 1.5rem; }
        .msg-err { background: #ffebee; color: #d32f2f; padding: 1rem; border-radius: 8px;
            border-left: 4px solid #d32f2f; margin: 0 auto 1.2rem;
            max-width: 900px; padding-left: 1.5rem; }
        .cat-list { display: grid; gap: .8rem; }
        .cat-row { display: flex; align-items: center; gap: 1rem; padding: .9rem 1rem;
            border: 2px solid #e0e0e0; border-radius: 10px; background: white; }
        .cat-row:hover { border-color: #069c6f; }
        .cat-icon { width: 46px; height: 46px; border-radius: 8px; background: #e8f5f1;
            display: flex; align-items: center; justify-content: center;
            color: #069c6f; font-weight: 700; font-size: 1.3rem; flex-shrink: 0; }
        .cat-info { flex: 1; }
        .cat-info strong { color: #333; font-size: .97rem; }
        .cat-info small { display: block; color: #888; font-size: .82rem; margin-top: .1rem; }
        .cat-actions { display: flex; gap: .5rem; }
        .btn-edit-cat { border: 2px solid #069c6f; color: #069c6f; background: white;
            padding: .35rem .8rem; border-radius: 8px; font-size: .82rem; font-weight: 600;
            text-decoration: none; }
        .btn-edit-cat:hover { background: #069c6f; color: white; }
        .btn-del-cat { border: 2px solid #d32f2f; color: #d32f2f; background: white;
            padding: .35rem .8rem; border-radius: 8px; font-size: .82rem; font-weight: 600;
            cursor: pointer; font-family: inherit; }
        .btn-del-cat:hover { background: #d32f2f; color: white; }
        .form-field { margin-bottom: 1rem; }
        .form-field label { font-weight: 600; display: block; margin-bottom: .4rem;
            color: #333; font-size: .9rem; }
        .form-field input, .form-field textarea {
            width: 100%; padding: .75rem .9rem; border: 2px solid #e0e0e0;
            border-radius: 8px; font-size: .93rem; font-family: inherit;
            transition: border-color .2s; box-sizing: border-box; }
        .form-field input:focus, .form-field textarea:focus { outline: none; border-color: #069c6f; }
        .btn-submit { background: #069c6f; color: white; border: none; padding: .75rem 1.8rem;
            border-radius: 8px; font-weight: 700; cursor: pointer; font-family: inherit;
            font-size: .95rem; width: 100%; }
        .btn-submit:hover { background: #038a63; }
        .btn-cancel { background: #f5f5f5; color: #555; border: 2px solid #e0e0e0;
            padding: .7rem 1.4rem; border-radius: 8px; font-weight: 600; cursor: pointer;
            font-family: inherit; font-size: .93rem; width: 100%; margin-bottom: .5rem;
            text-decoration: none; display: block; text-align: center; }
        .btn-cancel:hover { background: #e8e8e8; }
        .empty { text-align: center; padding: 2rem; color: #888; }
        .info-panel { text-align: center; padding: 2rem; color: #888; }
    </style>
</head>
<body>

<header th:replace="~{fragments/layout :: header}"></header>

<h1 class="page-title">Categorias</h1>

<div th:if="${exito}" class="msg-ok" th:text="${exito}"></div>
<div th:if="${error}"  class="msg-err" th:text="${error}"></div>

<div class="page-wrap">

    <!-- LISTA DE CATEGORIAS -->
    <div class="card">
        <h2>Categorias existentes</h2>
        <div th:if="${#lists.isEmpty(categorias)}" class="empty">
            <p>No hay categorias todavia.</p>
        </div>
        <div class="cat-list" th:unless="${#lists.isEmpty(categorias)}">
            <div th:each="cat : ${categorias}" class="cat-row">
                <!-- Icono de letra -->
                <div class="cat-icon">
                    <span th:text="${#strings.substring(cat.nombre,0,1).toUpperCase()}">C</span>
                </div>
                <!-- Info -->
                <div class="cat-info">
                    <strong th:text="${cat.nombre}">Nombre</strong>
                    <small th:if="${cat.descripcion}" th:text="${cat.descripcion}">Desc</small>
                </div>
                <!-- Acciones (solo ADMIN) -->
                <div class="cat-actions" sec:authorize="hasRole('ROLE_ADMIN')">
                    <a th:href="@{/categorias/{id}/editar(id=${cat.id})}" class="btn-edit-cat">Editar</a>
                    <form th:action="@{/categorias/{id}/eliminar(id=${cat.id})}" method="post"
                          style="display:inline"
                          onsubmit="return confirm('Eliminar la categoria ' + this.dataset.nombre + '?')"
                          th:data-nombre="${cat.nombre}">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <button type="submit" class="btn-del-cat">Eliminar</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- FORMULARIO CREAR / EDITAR (solo ADMIN) -->
    <div class="card" sec:authorize="hasRole('ROLE_ADMIN')">

        <!-- MODO EDITAR -->
        <div th:if="${editar != null}">
            <h2>Editando: <span th:text="${editar.nombre}" style="color:#069c6f;">Nombre</span></h2>
            <a th:href="@{/categorias}" class="btn-cancel">Cancelar edicion</a>
            <form th:action="@{/categorias/{id}/editar(id=${editar.id})}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <div class="form-field">
                    <label for="nombreEdit">Nombre *</label>
                    <input type="text" id="nombreEdit" name="nombre" th:value="${editar.nombre}" required>
                </div>
                <div class="form-field">
                    <label for="descEdit">Descripcion</label>
                    <input type="text" id="descEdit" name="descripcion" th:value="${editar.descripcion}"
                           placeholder="Descripcion opcional">
                </div>
                <button type="submit" class="btn-submit">Guardar cambios</button>
            </form>
        </div>

        <!-- MODO CREAR -->
        <div th:unless="${editar != null}">
            <h2>Nueva categoria</h2>
            <form th:action="@{/categorias/nueva}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <div class="form-field">
                    <label for="nombre">Nombre *</label>
                    <input type="text" id="nombre" name="nombre" required
                           placeholder="Ej: Italiana, Bocadillos, Ensaladas...">
                </div>
                <div class="form-field">
                    <label for="descripcion">Descripcion</label>
                    <input type="text" id="descripcion" name="descripcion"
                           placeholder="Descripcion opcional">
                </div>
                <button type="submit" class="btn-submit">Crear categoria</button>
            </form>
        </div>
    </div>

    <!-- Panel informativo para no admins -->
    <div class="card info-panel" sec:authorize="!hasRole('ROLE_ADMIN')">
        <p sec:authorize="!isAuthenticated()">
            <a th:href="@{/login}" style="color:#069c6f;font-weight:600;">Inicia sesion</a>
            para gestionar las categorias.
        </p>
        <p sec:authorize="isAuthenticated() and !hasRole('ROLE_ADMIN')" style="color:#aaa;font-style:italic;">
            Solo los administradores pueden crear o editar categorias.
        </p>
    </div>
</div>

</body>
</html>
