<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Restaurantes')}">
    <link rel="stylesheet" th:href="@{/css/restaurantes.css}">
</head>
<body>
<header th:replace="~{fragments/layout :: header}"></header>

<main>
    <!-- Barra de búsqueda + filtros de estado -->
    <div class="search-header">
        <div class="container">
            <div class="search-info">
                <form th:action="@{/restaurantes}" method="get" class="inline-search">
                    <input type="search" name="q" th:value="${q}"
                           placeholder="Busca por nombre o localidad...">
                    <button type="submit" class="btn-search">Buscar</button>
                </form>

                <!-- Filtros Todos / Acepta / No acepta (req. mínimo 7) -->
                <div class="filter-tabs">
                    <a th:href="@{/restaurantes(filtro='todos')}"
                       th:classappend="${filtro == 'todos' or filtro == null} ? 'active'"
                       class="filter-tab">Todos</a>
                    <a th:href="@{/restaurantes(filtro='acepta')}"
                       th:classappend="${filtro == 'acepta'} ? 'active'"
                       class="filter-tab">Aceptan pedidos</a>
                    <a th:href="@{/restaurantes(filtro='noAcepta')}"
                       th:classappend="${filtro == 'noAcepta'} ? 'active'"
                       class="filter-tab">No aceptan pedidos</a>
                </div>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="restaurants-layout">

            <!-- Sidebar filtros por categoría -->
            <aside class="filters-sidebar">
                <h2>Categorías</h2>
                <ul class="category-list">
                    <li>
                        <a th:href="@{/restaurantes}" class="category-link">
                            Todas las categorías
                        </a>
                    </li>
                    <li th:each="cat : ${categorias}">
                        <a th:href="@{/restaurantes(categoria=${cat.id})}"
                           th:text="${cat.nombre}"
                           class="category-link">Categoría</a>
                    </li>
                </ul>

                <!-- Ordenar por valoración (req. mínimo 5) -->
                <h2 style="margin-top:1.5rem">Ordenar</h2>
                <a th:href="@{/restaurantes(filtro='valoracion')}" class="category-link">
                    ⭐ Por valoración
                </a>
            </aside>

            <!-- Grid de restaurantes -->
            <section class="restaurants-content">
                <div class="results-header">
                    <h2>
                        <span th:text="${#lists.size(restaurantes)}">0</span>
                        establecimiento<span th:if="${#lists.size(restaurantes) != 1}">s</span>
                        disponible<span th:if="${#lists.size(restaurantes) != 1}">s</span>
                    </h2>
                </div>

                <div th:fragment="mensajes" th:replace="~{fragments/layout :: mensajes}"></div>

                <div class="restaurants-grid" th:if="${!#lists.isEmpty(restaurantes)}">
                    <article th:each="r : ${restaurantes}" class="restaurant-card">
                        <a th:href="@{/restaurantes/{id}(id=${r.id})}" class="restaurant-link">

                            <!-- Imagen o placeholder -->
                            <div class="restaurant-image">
                                <img th:if="${r.imagen != null}"
                                     th:src="@{'/uploads/' + ${r.imagen}}"
                                     th:alt="${r.nombre}">
                                <span th:unless="${r.imagen != null}"
                                      class="image-placeholder">🍽️</span>

                                <!-- Badge estado -->
                                <span th:unless="${r.aceptaPedidos}"
                                      class="promo-badge badge-closed">Cerrado</span>
                            </div>

                            <div class="restaurant-info">
                                <h3 th:text="${r.nombre}">Nombre</h3>

                                <div class="restaurant-rating">
                                    <span th:if="${r.mediaValoraciones != null and r.mediaValoraciones > 0}">
                                        ⭐ <strong th:text="${#numbers.formatDecimal(r.mediaValoraciones, 1, 1)}">0.0</strong>
                                    </span>
                                    <span th:unless="${r.mediaValoraciones != null and r.mediaValoraciones > 0}">
                                        <strong>Nuevo</strong>
                                    </span>
                                </div>

                                <!-- Categorías como tags -->
                                <div class="restaurant-tags">
                                    <span th:each="cat : ${r.categorias}"
                                          th:text="${cat.nombre}"
                                          class="tag"></span>
                                </div>

                                <div class="restaurant-details">
                                    <span th:if="${r.precioMin != null}">
                                        💶 <span th:text="${#numbers.formatDecimal(r.precioMin,1,2)}">0</span>€
                                        - <span th:text="${#numbers.formatDecimal(r.precioMax,1,2)}">0</span>€
                                    </span>
                                    <span th:if="${r.localidad != null}"
                                          th:text="'📍 ' + ${r.localidad}"></span>
                                </div>
                            </div>
                        </a>
                    </article>
                </div>

                <p th:if="${#lists.isEmpty(restaurantes)}"
                   style="color:#888; padding:2rem 0">
                    No se encontraron restaurantes con ese criterio.
                </p>
            </section>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<script th:src="@{/js/filters.js}"></script>
<script th:src="@{/js/star-filter.js}"></script>
</body>
</html>
