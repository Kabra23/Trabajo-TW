<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Valoraciones')}">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<header th:replace="~{fragments/layout :: header}"></header>

<main style="min-height:70vh; background:#f5f5f5; padding:2rem 0">
    <div class="container" style="max-width:800px">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem">
            <h1 style="color:#069c6f">Valoraciones del restaurante</h1>
            <a th:href="@{/restaurantes/{id}(id=${restauranteId})}"
               class="btn-secondary" style="text-decoration:none">← Volver al restaurante</a>
        </div>

        <div th:replace="~{fragments/layout :: mensajes}"></div>

        <div th:if="${#lists.isEmpty(valoraciones)}"
             style="text-align:center; padding:3rem; background:white; border-radius:12px">
            <p style="color:#888; font-size:1.2rem">Aún no hay valoraciones para este restaurante.</p>
        </div>

        <div th:each="val : ${valoraciones}"
             style="background:white; border-radius:12px; padding:1.5rem; margin-bottom:1rem; box-shadow:0 2px 8px rgba(0,0,0,.05)">
            <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:.8rem">
                <div>
                    <strong style="color:#333"
                            th:text="${val.usuario.nombre} + ' ' + ${val.usuario.apellidos}">Usuario</strong>
                    <br>
                    <small style="color:#aaa"
                           th:text="${#temporals.format(val.fecha, 'dd/MM/yyyy')}">Fecha</small>
                </div>
                <div style="display:flex; gap:.3rem; align-items:center">
                    <span th:each="n : ${#numbers.sequence(1,5)}"
                          th:text="${n <= val.puntuacion} ? '⭐' : '☆'"
                          style="font-size:1.2rem"></span>
                    <strong style="color:#069c6f; margin-left:.5rem"
                            th:text="${val.puntuacion} + '/5'">5/5</strong>
                </div>
            </div>

            <p th:if="${val.comentario}" th:text="${val.comentario}"
               style="color:#555; line-height:1.6; margin:0"></p>
            <p th:unless="${val.comentario}"
               style="color:#aaa; font-style:italic; margin:0">Sin comentario</p>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
