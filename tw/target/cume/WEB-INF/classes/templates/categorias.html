<!-- ============================================================
     categorias.html
     ============================================================ -->
<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Categorías')}">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<header th:replace="~{fragments/layout :: header}"></header>

<main style="min-height:70vh; background:#f5f5f5; padding:2rem 0">
    <div class="container">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem">
            <h1 style="color:#069c6f">Categorías</h1>
            <a sec:authorize="isAuthenticated()" th:href="@{/categorias/nueva}"
               class="btn-primary">+ Nueva categoría</a>
        </div>

        <div th:replace="~{fragments/layout :: mensajes}"></div>

        <div class="categories-grid">
            <div th:each="cat : ${categorias}"
                 style="background:white; border-radius:12px; overflow:hidden; box-shadow:0 2px 8px rgba(0,0,0,.05); text-align:center">
                <a th:href="@{/restaurantes(categoria=${cat.id})}" style="text-decoration:none; color:inherit">
                    <div style="height:120px; background:#e8f5f1; display:flex; align-items:center; justify-content:center">
                        <img th:if="${cat.imagen != null}"
                             th:src="@{'/uploads/' + ${cat.imagen}}"
                             th:alt="${cat.nombre}"
                             style="width:100%; height:100%; object-fit:cover">
                        <span th:unless="${cat.imagen != null}" style="font-size:3rem">🍴</span>
                    </div>
                    <div style="padding:1rem">
                        <h3 th:text="${cat.nombre}" style="margin-bottom:.3rem">Nombre</h3>
                        <p th:text="${cat.descripcion}" style="color:#888; font-size:.9rem"></p>
                    </div>
                </a>
                <div sec:authorize="isAuthenticated()" style="padding:0 1rem 1rem; display:flex; gap:.5rem; justify-content:center">
                    <a th:href="@{/categorias/{id}/editar(id=${cat.id})}"
                       class="btn-secondary" style="font-size:.85rem; padding:.4rem .8rem">Editar</a>
                    <form th:action="@{/categorias/{id}/eliminar(id=${cat.id})}" method="post"
                          onsubmit="return confirm('¿Eliminar esta categoría?')">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <button type="submit" class="btn-danger"
                                style="font-size:.85rem; padding:.4rem .8rem">Eliminar</button>
                    </form>
                </div>
            </div>
        </div>

        <p th:if="${#lists.isEmpty(categorias)}" style="color:#888; text-align:center; padding:3rem">
            No hay categorías todavía.
            <a sec:authorize="isAuthenticated()" th:href="@{/categorias/nueva}" style="color:#069c6f">Crear la primera</a>
        </p>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>s
